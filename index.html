<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadow Reading - 英语影子学习</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: #1a1a24;
            --bg-hover: #22222e;
            --accent-primary: #00d4aa;
            --accent-secondary: #7c3aed;
            --accent-gradient: linear-gradient(135deg, #00d4aa 0%, #00a8cc 100%);
            --text-primary: #ffffff;
            --text-secondary: #a0a0b0;
            --text-muted: #606070;
            --success: #00d4aa;
            --warning: #f59e0b;
            --error: #ef4444;
            --border: rgba(255,255,255,0.06);
            --font-display: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            --font-body: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            --sidebar-width: 280px;
        }

        .theme-light {
            --bg-primary: #f5f5f7;
            --bg-secondary: #ffffff;
            --bg-card: #ffffff;
            --bg-hover: #f0f0f2;
            --accent-primary: #00a884;
            --accent-gradient: linear-gradient(135deg, #00a884 0%, #0088cc 100%);
            --text-primary: #1a1a1a;
            --text-secondary: #333333;
            --text-muted: #555555;
            --success: #00a884;
            --border: rgba(0,0,0,0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-body);
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
        }

        .app { display: flex; min-height: 100vh; }

        .sidebar {
            width: var(--sidebar-width);
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
            z-index: 100;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
        }

        .logo-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            font-size: 18px;
            font-weight: 600;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .theme-toggle {
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            width: 36px;
            height: 36px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            transition: all 0.2s ease;
        }

        .theme-toggle:hover {
            background: var(--bg-hover);
            color: var(--accent-primary);
        }

        .stats-bar {
            display: flex;
            gap: 12px;
            margin-top: 16px;
        }

        .stat {
            flex: 1;
            background: var(--bg-card);
            padding: 12px 8px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid var(--border);
        }

        .stat-value {
            font-size: 18px;
            font-weight: 600;
            color: var(--accent-primary);
        }

        .stat-label {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .sidebar-tabs {
            display: flex;
            border-bottom: 1px solid var(--border);
            padding: 0 12px;
        }

        .sidebar-tab {
            flex: 1;
            padding: 12px 8px;
            text-align: center;
            font-size: 13px;
            color: var(--text-muted);
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.2s ease;
        }

        .sidebar-tab:hover { color: var(--text-secondary); }

        .sidebar-tab.active {
            color: var(--accent-primary);
            border-bottom-color: var(--accent-primary);
        }

        .article-list, .word-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }

        .article-list::-webkit-scrollbar, .word-list::-webkit-scrollbar { width: 4px; }
        .article-list::-webkit-scrollbar-thumb, .word-list::-webkit-scrollbar-thumb { background: var(--bg-hover); border-radius: 2px; }

        .article-item {
            padding: 10px 12px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 4px;
            font-size: 13px;
            color: var(--text-secondary);
            transition: all 0.15s ease;
        }

        .article-item:hover { background: var(--bg-hover); color: var(--text-primary); }

        .article-item.active {
            background: rgba(0, 212, 170, 0.1);
            color: var(--accent-primary);
        }

        .article-item.completed { color: var(--success); }

        .article-num {
            width: 24px;
            height: 24px;
            border-radius: 6px;
            background: var(--bg-card);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 500;
            flex-shrink: 0;
            border: 1px solid var(--border);
        }

        .article-item.completed .article-num { background: var(--success); color: #fff; border: none; }

        .word-item {
            padding: 12px;
            background: var(--bg-card);
            border-radius: 8px;
            margin-bottom: 8px;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .word-item:hover { border-color: var(--accent-primary); }

        .word-item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }

        .word-item-word {
            font-size: 15px;
            font-weight: 500;
            color: var(--text-primary);
        }

        .word-item-status {
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 10px;
        }

        .word-item-status.unknown { background: var(--bg-hover); color: var(--text-muted); }
        .word-item-status.learning { background: rgba(245, 158, 11, 0.15); color: var(--warning); }
        .word-item-status.mastered { background: rgba(0, 212, 170, 0.15); color: var(--success); }
        .word-item-status.review { background: rgba(239, 68, 68, 0.15); color: var(--error); }

        .word-item-def {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        .word-item-phonetic {
            font-size: 11px;
            color: var(--text-muted);
        }

        .main {
            flex: 1;
            margin-left: var(--sidebar-width);
            padding: 24px 40px;
            max-width: 920px;
        }

        .btn.active {
            background: var(--accent-primary);
            color: #fff;
            border-color: var(--accent-primary);
        }

        .btn.recording {
            background: var(--error);
            color: #fff;
            border-color: var(--error);
        }

        .header { margin-bottom: 20px; }

        .title-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }

        .article-title {
            font-size: 24px;
            font-weight: 600;
        }

        .article-subtitle {
            font-size: 14px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .controls {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 16px;
            align-items: center;
        }

        .btn {
            padding: 8px 14px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.15s ease;
            font-family: inherit;
        }

        .btn-primary {
            background: var(--accent-gradient);
            color: #fff;
        }

        .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }

        .btn-secondary {
            background: var(--bg-card);
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover { background: var(--bg-hover); color: var(--text-primary); }

        .btn-icon { padding: 8px; }

        .select-group {
            display: flex;
            align-items: center;
            gap: 6px;
            background: var(--bg-card);
            padding: 6px 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .select-group label {
            font-size: 12px;
            color: var(--text-muted);
            white-space: nowrap;
        }

        .select-group select {
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 13px;
            cursor: pointer;
            outline: none;
        }

        .progress-track {
            height: 3px;
            background: var(--bg-card);
            border-radius: 2px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: var(--accent-gradient);
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        .content {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 28px 32px;
            border: 1px solid var(--border);
        }

        .paragraph-wrapper {
            margin-bottom: 20px;
            position: relative;
        }

        .paragraph-wrapper:last-child { margin-bottom: 0; }

        .paragraph-wrapper.playing {
            background: linear-gradient(135deg, rgba(0, 212, 170, 0.1) 0%, rgba(0, 168, 204, 0.1) 100%);
            border-radius: 12px;
            padding: 12px;
            margin: -12px;
            margin-bottom: 8px;
            border-left: 3px solid var(--accent-primary);
        }

        .paragraph-wrapper.playing p {
            color: var(--text-primary);
        }

        .paragraph-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }

        .play-paragraph-btn {
            background: var(--bg-hover);
            border: 1px solid var(--border);
            color: var(--text-muted);
            width: 28px;
            height: 28px;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            transition: all 0.15s ease;
        }

        .play-paragraph-btn:hover {
            background: var(--accent-primary);
            color: #fff;
            border-color: var(--accent-primary);
        }

        .play-paragraph-btn.playing {
            background: var(--accent-primary);
            color: #fff;
            border-color: var(--accent-primary);
        }

        .paragraph-num {
            font-size: 11px;
            color: var(--text-muted);
            background: var(--bg-hover);
            padding: 2px 8px;
            border-radius: 4px;
        }

        .content p {
            margin-bottom: 10px;
            font-size: 15px;
            line-height: 1.85;
            text-align: justify;
            color: var(--text-secondary);
        }

        .content p:last-child { margin-bottom: 0; }

        .translation {
            background: var(--bg-hover);
            border-left: 3px solid var(--accent-primary);
            padding: 12px 16px;
            margin-top: 8px;
            border-radius: 0 8px 8px 0;
            font-size: 14px;
            line-height: 1.8;
            color: var(--text-muted);
            display: none;
        }

        .translation.show {
            display: block;
        }

        .word {
            cursor: pointer;
            padding: 1px 2px;
            border-radius: 3px;
            transition: all 0.1s ease;
            display: inline-block;
            color: var(--text-muted);
        }

        .word:hover {
            background: rgba(0, 212, 170, 0.2);
            color: var(--accent-primary);
        }

        .word.mastered {
            color: var(--success);
            font-weight: 500;
        }

        .word.review {
            color: var(--error);
            font-weight: 500;
        }

        .word.playing {
            background: var(--accent-primary);
            color: #fff;
        }

        .nav-row {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
        }

        .practice-mode .paragraph-wrapper p {
            color: transparent;
            text-shadow: 0 0 8px var(--text-muted);
            user-select: none;
        }

        .practice-mode .paragraph-wrapper:hover p {
            color: var(--text-secondary);
            text-shadow: none;
        }

        .practice-mode .word {
            pointer-events: none;
        }

        .practice-panel {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            margin-top: 16px;
            display: none;
        }

        .practice-panel.show {
            display: block;
        }

        .practice-panel h4 {
            margin: 0 0 12px 0;
            font-size: 14px;
            color: var(--text-muted);
        }

        .practice-timer {
            font-size: 32px;
            font-weight: 600;
            color: var(--accent-primary);
            text-align: center;
            margin: 16px 0;
        }

        .practice-actions {
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .recording-indicator {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--error);
            font-weight: 500;
        }

        .recording-indicator::before {
            content: '';
            width: 10px;
            height: 10px;
            background: var(--error);
            border-radius: 50%;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .word-popup {
            position: fixed;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px 20px;
            min-width: 300px;
            max-width: 340px;
            z-index: 1000;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            opacity: 0;
            transform: scale(0.95);
            transition: all 0.2s ease;
            pointer-events: none;
        }

        .word-popup.show {
            opacity: 1;
            transform: scale(1);
            pointer-events: auto;
        }

        .popup-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 10px;
        }

        .popup-word {
            font-size: 22px;
            font-weight: 600;
        }

        .popup-phonetic {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .popup-actions {
            display: flex;
            gap: 6px;
        }

        .popup-btn {
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            width: 32px;
            height: 32px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s ease;
            font-size: 14px;
        }

        .popup-btn:hover { background: var(--bg-hover); color: var(--accent-primary); border-color: var(--accent-primary); }

        .popup-status-btns {
            display: flex;
            gap: 8px;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--border);
        }

        .status-btn {
            flex: 1;
            padding: 8px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--bg-card);
            color: var(--text-secondary);
            font-size: 12px;
            cursor: pointer;
            transition: all 0.15s ease;
            font-family: inherit;
        }

        .status-btn:hover { border-color: var(--text-muted); }

        .status-btn.unknown.active { background: var(--bg-hover); color: var(--text-muted); border-color: transparent; }
        .status-btn.mastered.active { background: rgba(0, 212, 170, 0.15); color: var(--success); border-color: var(--success); }
        .status-btn.review.active { background: rgba(239, 68, 68, 0.15); color: var(--error); border-color: var(--error); }

        .popup-pos {
            display: inline-block;
            font-size: 12px;
            color: var(--accent-primary);
            font-weight: 500;
            margin-right: 8px;
        }

        .popup-def {
            font-size: 14px;
            color: var(--text-primary);
            margin-bottom: 10px;
            line-height: 1.5;
        }

        .popup-example {
            font-size: 12px;
            color: var(--text-muted);
            background: var(--bg-card);
            padding: 10px;
            border-radius: 6px;
            font-style: italic;
            line-height: 1.5;
        }

        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: var(--bg-card);
            color: var(--text-primary);
            padding: 12px 20px;
            border-radius: 8px;
            border: 1px solid var(--border);
            font-size: 13px;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.3s ease;
            z-index: 2000;
        }

        .toast.show { opacity: 1; transform: translateY(0); }

        .tips {
            margin-top: auto;
            padding: 14px;
            background: linear-gradient(135deg, rgba(0,212,170,0.08) 0%, rgba(124,58,237,0.08) 100%);
            border-radius: 8px;
            border: 1px solid var(--border);
            margin: 12px;
        }

        .tips-title {
            font-size: 12px;
            font-weight: 500;
            color: var(--accent-primary);
            margin-bottom: 8px;
        }

        .tips-list {
            font-size: 12px;
            color: var(--text-muted);
            padding-left: 16px;
        }

        .tips-list li { margin-bottom: 3px; }

        .progress-indicator {
            font-size: 12px;
            color: var(--text-muted);
            margin-left: 12px;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
        }

        .empty-state-icon {
            font-size: 40px;
            margin-bottom: 12px;
        }

        @media (max-width: 768px) {
            .sidebar { width: 100%; position: relative; height: auto; }
            .app { flex-direction: column; }
            .main { margin-left: 0; padding: 16px; }
            .content { padding: 20px; }
            .title-row { flex-direction: column; align-items: flex-start; }
            .stats-bar { display: none; }
            .controls { flex-wrap: wrap; }
        }
    </style>
</head>
<body onload="init()">
    <div class="app">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo-row">
                    <div class="logo">
                        <span>◈</span> Shadow Reading
                    </div>
                    <button class="theme-toggle" onclick="toggleTheme()" title="切换主题">🌙</button>
                </div>
                <div class="stats-bar">
                    <div class="stat">
                        <div class="stat-value" id="completedCount">0</div>
                        <div class="stat-label">已完成</div>
                    </div>
                    <div class="stat">
                        <div class="stat-value" id="wordCount">0</div>
                        <div class="stat-label">已学单词</div>
                    </div>
                    <div class="stat">
                        <div class="stat-value" id="masteredCount">0</div>
                        <div class="stat-label">已掌握</div>
                    </div>
                </div>
            </div>
            <div class="sidebar-tabs">
                <div class="sidebar-tab active" id="tabArticles" onclick="switchTab('articles')">📚 文章</div>
                <div class="sidebar-tab" id="tabWords" onclick="switchTab('words')">📝 生词本</div>
            </div>
            <div class="article-list" id="articleList"></div>
            <div class="word-list" id="wordList" style="display: none;"></div>
            <div class="tips">
                <div class="tips-title">学习方法</div>
                <ol class="tips-list">
                    <li>空格键播放/暂停</li>
                    <li>左右箭头切换文章</li>
                    <li>点击单词查看释义</li>
                    <li>选择掌握程度：灰→绿→红</li>
                </ol>
            </div>
            <a href="words.html" class="sidebar-link" style="margin: 12px; padding: 12px; background: var(--bg-hover); border-radius: 8px; text-decoration: none; color: var(--text-primary); display: flex; align-items: center; gap: 8px; font-size: 14px;">
                📚 全部单词本
            </a>
        </aside>

        <main class="main">
            <div class="header">
                <div class="title-row">
                    <div>
                        <h1 class="article-title" id="articleTitle">Loading...</h1>
                        <div class="article-subtitle" id="articleSubtitle"></div>
                    </div>
                    <span class="progress-indicator" id="progressIndicator">1/20</span>
                </div>
            </div>

            <div class="controls">
                <button class="btn btn-primary" id="playBtn" onclick="togglePlay()">
                    <span id="playIcon">▶</span> <span id="playText">播放</span>
                </button>
                <button class="btn btn-secondary btn-icon" onclick="stopReading()" title="停止">◼</button>
                
                <button class="btn btn-secondary" id="translateBtn" onclick="toggleTranslation()">
                    🌐 显示翻译
                </button>
                
                <button class="btn btn-secondary" id="shadowBtn" onclick="toggleShadowMode()">
                    🎭 复述练习
                </button>
                
                <button class="btn btn-secondary" onclick="exportData()" title="导出学习数据">📤 导出</button>
                <button class="btn btn-secondary" onclick="document.getElementById('importFile').click()" title="导入学习数据">📥 导入</button>
                
                <div class="select-group">
                    <label>语速</label>
                    <select id="speedSelect" onchange="updateSpeed()">
                        <option value="0.5">0.5x</option>
                        <option value="0.75">0.75x</option>
                        <option value="1" selected>1x</option>
                        <option value="1.25">1.25x</option>
                        <option value="1.5">1.5x</option>
                    </select>
                </div>
                
                <div class="select-group">
                    <label>音色</label>
                    <select id="voiceSelect" onchange="updateVoice()"></select>
                </div>
                
                <button class="btn btn-secondary" onclick="testSpeech()" title="测试语音">🔊 测试语音</button>
            </div>

            <div class="progress-track">
                <div class="progress-bar" id="progressBar" style="width: 5%"></div>
            </div>

            <div class="content" id="articleContent"></div>

            <div class="practice-panel" id="practicePanel">
                <h4>🎤 复述练习模式</h4>
                <p style="font-size: 13px; color: var(--text-muted); margin-bottom: 12px;">
                    英文已隐藏，请根据中文翻译尝试用英语复述。鼠标悬停可查看原文。
                </p>
                <div class="practice-timer" id="practiceTimer">00:00</div>
                <div class="practice-actions">
                    <button class="btn btn-primary" id="recordBtn" onclick="toggleRecording()">
                        🎙️ 开始录音
                    </button>
                    <button class="btn btn-secondary" onclick="playRecording()" id="playRecordingBtn" disabled>
                        ▶️ 播放录音
                    </button>
                    <button class="btn btn-secondary" onclick="playOriginal()">
                        🔊 播放原文
                    </button>
                </div>
                <div id="recordingStatus" style="text-align: center; margin-top: 12px;"></div>
            </div>

            <div class="nav-row">
                <button class="btn btn-secondary" id="prevBtn" onclick="prevArticle()">← 上一篇</button>
                <button class="btn btn-secondary" id="nextBtn" onclick="nextArticle()">下一篇 →</button>
            </div>
        </main>
    </div>

    <div class="word-popup" id="wordPopup">
        <div class="popup-header">
            <div>
                <div class="popup-word" id="popupWord"></div>
                <div class="popup-phonetic" id="popupPhonetic"></div>
            </div>
            <div class="popup-actions">
                <button class="popup-btn" onclick="pronounceWord()" title="发音">🔊</button>
            </div>
        </div>
        <div class="popup-def"><span class="popup-pos" id="popupPos"></span><span id="popupDef"></span></div>
        <div class="popup-example" id="popupExample"></div>
        <div class="popup-status-btns">
            <button class="status-btn unknown" onclick="setWordStatus('unknown')">不认识</button>
            <button class="status-btn mastered" onclick="setWordStatus('mastered')">已掌握</button>
            <button class="status-btn review" onclick="setWordStatus('review')">需复习</button>
        </div>
    </div>

    <div class="toast" id="toast"></div>
    
    <input type="file" id="importFile" accept=".json" style="display:none" onchange="handleImport(event)">

    <script src="articles-data.js"></script>
    <script src="dictionary-data.js"></script>
    <script>

let currentArticle = 0;
let isPlaying = false;
let speechSynthesis = window.speechSynthesis;
let currentUtterance = null;
let speechRate = 1;
let voiceLang = 'en-US';
let completedArticles = new Set();
let wordStatuses = {};
let currentWord = '';
let currentTab = 'articles';
let showTranslation = false;
let currentParagraphIndex = -1;
let practiceMode = false;
let mediaRecorder = null;
let recordedChunks = [];
let recordedBlob = null;
let recordingStartTime = null;
let timerInterval = null;
let lastBackupReminder = 0;
const BACKUP_INTERVAL = 7 * 24 * 60 * 60 * 1000;

function init() {
    loadTheme();
    loadProgress();
    renderArticleList();
    const initialTarget = getInitialArticleTarget();
    loadArticle(initialTarget.articleIndex);
    loadVoices();
    checkBackupReminder();
    if (initialTarget.paragraphIndex !== null) {
        jumpToParagraph(initialTarget.paragraphIndex);
    }
}

function getInitialArticleTarget() {
    const params = new URLSearchParams(window.location.search);
    const articleParam = parseInt(params.get('article'), 10);
    const paragraphParam = parseInt(params.get('paragraph'), 10);
    const safeArticleIndex = Number.isInteger(articleParam) && articleParam >= 1 && articleParam <= articles.length ? articleParam - 1 : 0;
    const safeParagraphIndex = Number.isInteger(paragraphParam) && paragraphParam >= 1 ? paragraphParam - 1 : null;
    return {
        articleIndex: safeArticleIndex,
        paragraphIndex: safeParagraphIndex
    };
}

function jumpToParagraph(paragraphIndex) {
    const target = document.querySelector(`.paragraph-wrapper[data-index="${paragraphIndex}"]`);
    if (!target) return;
    target.scrollIntoView({ behavior: 'smooth', block: 'center' });
    target.classList.add('playing');
    setTimeout(() => target.classList.remove('playing'), 1200);
}

function checkBackupReminder() {
    const lastBackup = localStorage.getItem('shadowReading_lastBackup');
    const now = Date.now();
    
    if (!lastBackup || (now - parseInt(lastBackup)) > BACKUP_INTERVAL) {
        const masteredCount = Object.values(wordStatuses).filter(s => s === 'mastered').length;
        const reviewCount = Object.values(wordStatuses).filter(s => s === 'review').length;
        
        if (masteredCount > 10 || reviewCount > 5) {
            setTimeout(() => {
                showToast('💡 建议导出备份，防止数据丢失！');
            }, 3000);
        }
    }
}

function loadTheme() {
    const theme = localStorage.getItem('shadowReadingTheme');
    if (theme === 'light') {
        document.body.classList.add('theme-light');
        document.querySelector('.theme-toggle').textContent = '☀️';
    }
}

function toggleTheme() {
    document.body.classList.toggle('theme-light');
    const isLight = document.body.classList.contains('theme-light');
    document.querySelector('.theme-toggle').textContent = isLight ? '☀️' : '🌙';
    localStorage.setItem('shadowReadingTheme', isLight ? 'light' : 'dark');
}

function toggleTranslation() {
    showTranslation = !showTranslation;
    const btn = document.getElementById('translateBtn');
    btn.textContent = showTranslation ? '🌐 隐藏翻译' : '🌐 显示翻译';
    document.querySelectorAll('.translation').forEach(el => {
        el.classList.toggle('show', showTranslation);
    });
}

function togglePracticeMode() {
    practiceMode = !practiceMode;
    const btn = document.getElementById('shadowBtn');
    const panel = document.getElementById('practicePanel');
    const content = document.getElementById('articleContent');
    
    if (practiceMode) {
        btn.classList.add('active');
        btn.textContent = '🎭 退出练习';
        panel.classList.add('show');
        content.classList.add('practice-mode');
        if (!showTranslation) toggleTranslation();
    } else {
        btn.classList.remove('active');
        btn.textContent = '🎭 复述练习';
        panel.classList.remove('show');
        content.classList.remove('practice-mode');
        stopRecording();
    }
}

function toggleRecording() {
    if (mediaRecorder && mediaRecorder.state === 'recording') {
        stopRecording();
    } else {
        startRecording();
    }
}

async function startRecording() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream);
        recordedChunks = [];
        
        mediaRecorder.ondataavailable = (e) => {
            if (e.data.size > 0) recordedChunks.push(e.data);
        };
        
        mediaRecorder.onstop = () => {
            recordedBlob = new Blob(recordedChunks, { type: 'audio/webm' });
            document.getElementById('playRecordingBtn').disabled = false;
            document.getElementById('recordingStatus').innerHTML = 
                '<span style="color: var(--success);">✅ 录音完成，可以播放对比</span>';
        };
        
        mediaRecorder.start();
        recordingStartTime = Date.now();
        updateTimer();
        timerInterval = setInterval(updateTimer, 100);
        
        document.getElementById('recordBtn').innerHTML = '⏹️ 停止录音';
        document.getElementById('recordBtn').classList.add('recording');
        document.getElementById('recordingStatus').innerHTML = 
            '<span class="recording-indicator">正在录音...</span>';
    } catch (err) {
        document.getElementById('recordingStatus').innerHTML = 
            '<span style="color: var(--error);">❌ 无法访问麦克风</span>';
    }
}

function stopRecording() {
    if (mediaRecorder && mediaRecorder.state === 'recording') {
        mediaRecorder.stop();
        mediaRecorder.stream.getTracks().forEach(track => track.stop());
    }
    clearInterval(timerInterval);
    document.getElementById('recordBtn').innerHTML = '🎙️ 开始录音';
    document.getElementById('recordBtn').classList.remove('recording');
}

function updateTimer() {
    const elapsed = Math.floor((Date.now() - recordingStartTime) / 1000);
    const mins = String(Math.floor(elapsed / 60)).padStart(2, '0');
    const secs = String(elapsed % 60).padStart(2, '0');
    document.getElementById('practiceTimer').textContent = `${mins}:${secs}`;
}

function playRecording() {
    if (recordedBlob) {
        const audio = new Audio(URL.createObjectURL(recordedBlob));
        audio.play();
    }
}

function playOriginal() {
    const article = articles[currentArticle];
    stopReading();
    
    currentUtterance = new SpeechSynthesisUtterance(article.content);
    const voice = getSelectedVoice();
    if (voice) {
        currentUtterance.voice = voice;
        currentUtterance.lang = voice.lang;
    } else {
        currentUtterance.lang = 'en-US';
    }
    currentUtterance.rate = speechRate;
    currentUtterance.volume = 1;
    
    currentUtterance.onstart = () => console.log('playOriginal 开始');
    currentUtterance.onend = () => {
        console.log('playOriginal 结束');
        isPlaying = false;
        updatePlayButton();
    };
    currentUtterance.onerror = (e) => {
        console.error('playOriginal 错误:', e);
        isPlaying = false;
        updatePlayButton();
    };
    
    isPlaying = true;
    updatePlayButton();
    speechSynthesis.speak(currentUtterance);
}

function playParagraph(index, autoContinue = false) {
    const article = articles[currentArticle];
    const paragraphs = article.content.split('\n\n');
    
    if (index < 0 || index >= paragraphs.length) {
        if (autoContinue) {
            stopReading();
            completedArticles.add(currentArticle);
            saveProgress();
            renderArticleList();
            updateStats();
            showToast('🎉 完成！');
        }
        return;
    }
    
    if (!autoContinue) {
        stopReading();
    }
    
    document.querySelectorAll('.paragraph-wrapper').forEach(wrapper => wrapper.classList.remove('playing'));
    document.querySelectorAll('.play-paragraph-btn').forEach(btn => btn.classList.remove('playing'));
    
    const currentWrapper = document.querySelector(`.paragraph-wrapper[data-index="${index}"]`);
    const currentBtn = currentWrapper?.querySelector('.play-paragraph-btn');
    if (currentWrapper) currentWrapper.classList.add('playing');
    if (currentBtn) currentBtn.classList.add('playing');
    
    if (currentWrapper) {
        currentWrapper.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
    
    currentParagraphIndex = index;
    isPlaying = true;
    updatePlayButton();
    
    currentUtterance = new SpeechSynthesisUtterance(paragraphs[index]);
    const voice = getSelectedVoice();
    if (voice) {
        currentUtterance.voice = voice;
        currentUtterance.lang = voice.lang;
    } else {
        currentUtterance.lang = 'en-US';
    }
    currentUtterance.rate = speechRate;
    currentUtterance.volume = 1;
    
    currentUtterance.onstart = () => console.log('段落播放开始:', index + 1);
    currentUtterance.onend = () => {
        console.log('段落播放结束:', index + 1);
        if (currentWrapper) currentWrapper.classList.remove('playing');
        if (currentBtn) currentBtn.classList.remove('playing');
        currentParagraphIndex = -1;
        
        if (autoContinue && isPlaying) {
            playParagraph(index + 1, true);
        } else {
            isPlaying = false;
            updatePlayButton();
        }
    };
    
    currentUtterance.onerror = (e) => {
        console.error('段落播放错误:', e);
        if (currentWrapper) currentWrapper.classList.remove('playing');
        if (currentBtn) currentBtn.classList.remove('playing');
        currentParagraphIndex = -1;
        isPlaying = false;
        updatePlayButton();
    };
    
    speechSynthesis.speak(currentUtterance);
}

function switchTab(tab) {
    currentTab = tab;
    document.getElementById('tabArticles').classList.toggle('active', tab === 'articles');
    document.getElementById('tabWords').classList.toggle('active', tab === 'words');
    document.getElementById('articleList').style.display = tab === 'articles' ? 'block' : 'none';
    document.getElementById('wordList').style.display = tab === 'words' ? 'block' : 'none';
    
    if (tab === 'words') {
        renderWordList();
    }
}

function loadVoices() {
    const voices = speechSynthesis.getVoices();
    const select = document.getElementById('voiceSelect');
    select.innerHTML = '';
    
    const enVoices = voices.filter(v => v.lang.startsWith('en'));
    const zhVoices = voices.filter(v => v.lang.startsWith('zh'));
    
    if (enVoices.length > 0) {
        const group = document.createElement('optgroup');
        group.label = 'English';
        enVoices.forEach((v, i) => {
            const opt = document.createElement('option');
            opt.value = v.name;
            opt.textContent = v.name;
            opt.dataset.voiceIndex = voices.indexOf(v);
            group.appendChild(opt);
        });
        select.appendChild(group);
    }
    
    if (zhVoices.length > 0) {
        const group = document.createElement('optgroup');
        group.label = '中文';
        zhVoices.forEach((v, i) => {
            const opt = document.createElement('option');
            opt.value = v.name;
            opt.textContent = v.name;
            opt.dataset.voiceIndex = voices.indexOf(v);
            group.appendChild(opt);
        });
        select.appendChild(group);
    }
    
    if (select.options.length === 0) {
        select.innerHTML = '<option value="en-US">English US</option><option value="zh-CN">中文</option>';
        return;
    }

    const preferredVoice = findPreferredVoice(voices);
    if (preferredVoice) {
        const preferredIndex = voices.indexOf(preferredVoice);
        const preferredOption = Array.from(select.options).find(opt => parseInt(opt.dataset.voiceIndex, 10) === preferredIndex);
        if (preferredOption) {
            select.value = preferredOption.value;
        }
    }
}

function findPreferredVoice(voices) {
    const googleUS = voices.find(v => v.name === 'Google US English');
    if (googleUS) return googleUS;
    return voices.find(v => v.lang === 'en-US') || voices.find(v => v.lang.startsWith('en')) || null;
}

if (speechSynthesis.onvoiceschanged !== undefined) {
    speechSynthesis.onvoiceschanged = loadVoices;
}

function renderArticleList() {
    const list = document.getElementById('articleList');
    list.innerHTML = articles.map((article, index) => `
        <div class="article-item ${index === currentArticle ? 'active' : ''} ${completedArticles.has(index) ? 'completed' : ''}" 
            onclick="loadArticle(${index})">
            <span class="article-num">${completedArticles.has(index) ? '✓' : index + 1}</span>
            <span>${article.title}</span>
        </div>
    `).join('');
}

function renderWordList() {
    const list = document.getElementById('wordList');
    const words = Object.keys(wordStatuses).filter(w => dictionary[w]);
    
    if (words.length === 0) {
        list.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📝</div><p>点击单词开始学习</p></div>';
        return;
    }
    
    list.innerHTML = words.map(word => {
        const status = wordStatuses[word] || 'unknown';
        const data = dictionary[word];
        return `
            <div class="word-item" onclick="showWordFromList('${word}')">
                <div class="word-item-header">
                    <span class="word-item-word">${word}</span>
                    <span class="word-item-status ${status}">${status === 'unknown' ? '不认识' : status === 'mastered' ? '已掌握' : status === 'review' ? '需复习' : '学习中'}</span>
                </div>
                <div class="word-item-def">${data ? data.def : '暂无释义'}</div>
                <div class="word-item-phonetic">${data ? data.phonetic : ''}</div>
            </div>
        `;
    }).join('');
}

function showWordFromList(word) {
    const data = dictionary[word];
    if (!data) return;
    
    const popup = document.getElementById('wordPopup');
    document.getElementById('popupWord').textContent = word;
    document.getElementById('popupPhonetic').textContent = data.phonetic || '';
    document.getElementById('popupPos').textContent = data.pos || '';
    document.getElementById('popupDef').textContent = data.def || '暂无释义';
    document.getElementById('popupExample').textContent = data.example ? `"${data.example}"` : '';
    
    currentWord = word;
    updateStatusButtons();
    
    popup.style.left = '50%';
    popup.style.top = '50%';
    popup.style.transform = 'translate(-50%, -50%)';
    popup.classList.add('show');
}

function loadArticle(index) {
    currentArticle = index;
    const article = articles[index];
    document.getElementById('articleTitle').textContent = article.title;
    document.getElementById('articleSubtitle').textContent = article.subtitle;
    document.getElementById('progressIndicator').textContent = `${index + 1}/${articles.length}`;
    
    const content = document.getElementById('articleContent');
    const paragraphs = article.content.split('\n\n');
    const translations = article.translation ? article.translation.split('\n\n') : [];
    
    content.innerHTML = paragraphs.map((p, i) => {
        const words = p.split(/(\s+)/).map(word => {
            const cleanWord = word.toLowerCase().replace(/[.,!?;:'"]/g, '');
            if (cleanWord && cleanWord.length > 1) {
                const status = wordStatuses[cleanWord];
                return `<span class="word ${status || ''}" data-word="${cleanWord}" onclick="showWordPopup(event, '${cleanWord}')">${word}</span>`;
            }
            return word;
        }).join('');
        
        const translation = translations[i] || '';
        
        return `
            <div class="paragraph-wrapper" data-index="${i}">
                <div class="paragraph-header">
                    <button class="play-paragraph-btn" onclick="playParagraph(${i})" title="播放此段">▶</button>
                    <span class="paragraph-num">P${i + 1}</span>
                </div>
                <p>${words}</p>
                ${translation ? `<div class="translation">${translation}</div>` : ''}
            </div>
        `;
    }).join('');

    renderArticleList();
    document.getElementById('progressBar').style.width = ((index + 1) / articles.length * 100) + '%';
    document.getElementById('prevBtn').disabled = index === 0;
    document.getElementById('nextBtn').disabled = index === articles.length - 1;
    
    if (showTranslation) {
        document.querySelectorAll('.translation').forEach(el => el.classList.add('show'));
    }
}

function showWordPopup(event, word) {
    event.stopPropagation();
    const popup = document.getElementById('wordPopup');
    const wordData = getWordDataWithFallback(word, event.target);
    
    document.getElementById('popupWord').textContent = word;
    document.getElementById('popupPhonetic').textContent = wordData.phonetic;
    document.getElementById('popupPos').textContent = wordData.pos;
    document.getElementById('popupDef').textContent = wordData.def;
    document.getElementById('popupExample').textContent = wordData.example ? `"${wordData.example}"` : '';
    
    currentWord = word;
    if (!wordStatuses[word]) {
        wordStatuses[word] = 'unknown';
    }
    updateStatusButtons();
    
    popup.style.left = Math.min(event.pageX, window.innerWidth - 350) + 'px';
    popup.style.top = Math.min(event.pageY + 10, window.innerHeight - 250) + 'px';
    popup.style.transform = '';
    popup.classList.add('show');
    
    saveProgress();
    updateStats();
}

function getWordDataWithFallback(word, clickedElement) {
    const direct = dictionary[word];
    if (direct) {
        return {
            phonetic: direct.phonetic || '',
            pos: direct.pos || '',
            def: direct.def || '暂无释义',
            example: direct.example || ''
        };
    }

    const normalizedCandidates = getWordCandidates(word);
    for (const candidate of normalizedCandidates) {
        if (dictionary[candidate]) {
            const matched = dictionary[candidate];
            return {
                phonetic: matched.phonetic || '',
                pos: matched.pos || '',
                def: `${matched.def || '暂无释义'}（原形：${candidate}）`,
                example: matched.example || ''
            };
        }
    }

    const contextualDef = getContextualDefinition(clickedElement);
    return {
        phonetic: '',
        pos: '',
        def: contextualDef || '暂无释义',
        example: ''
    };
}

function getWordCandidates(word) {
    const candidates = new Set();
    const lower = (word || '').toLowerCase();
    if (!lower) return [];
    candidates.add(lower);

    if (lower.endsWith('ies') && lower.length > 3) candidates.add(lower.slice(0, -3) + 'y');
    if (lower.endsWith('es') && lower.length > 2) candidates.add(lower.slice(0, -2));
    if (lower.endsWith('s') && lower.length > 1) candidates.add(lower.slice(0, -1));
    if (lower.endsWith('ied') && lower.length > 3) candidates.add(lower.slice(0, -3) + 'y');
    if (lower.endsWith('ed') && lower.length > 2) candidates.add(lower.slice(0, -2));
    if (lower.endsWith('ing') && lower.length > 3) candidates.add(lower.slice(0, -3));

    return [...candidates];
}

function getContextualDefinition(clickedElement) {
    const wrapper = clickedElement ? clickedElement.closest('.paragraph-wrapper') : null;
    if (!wrapper) return '';
    const paragraphIndex = parseInt(wrapper.dataset.index, 10);
    if (!Number.isInteger(paragraphIndex)) return '';

    const article = articles[currentArticle];
    const translations = article && article.translation ? article.translation.split('\n\n') : [];
    const translation = translations[paragraphIndex] || '';
    if (!translation) return '';
    return `语境释义：${translation}`;
}

function updateStatusButtons() {
    const status = wordStatuses[currentWord] || 'unknown';
    document.querySelectorAll('.status-btn').forEach(btn => {
        btn.classList.toggle('active', btn.classList.contains(status));
    });
}

function setWordStatus(status) {
    wordStatuses[currentWord] = status;
    updateStatusButtons();
    saveProgress();
    updateStats();
    
    const wordElements = document.querySelectorAll(`.word[data-word="${currentWord}"]`);
    wordElements.forEach(el => {
        el.classList.remove('mastered', 'review');
        if (status === 'mastered') el.classList.add('mastered');
        if (status === 'review') el.classList.add('review');
    });
    
    showToast(status === 'mastered' ? '✅ 已掌握' : status === 'review' ? '🔴 标记需复习' : '⚪ 不认识');
    
    if (currentTab === 'words') {
        renderWordList();
    }
}

function closePopup() {
    document.getElementById('wordPopup').classList.remove('show');
}

function pronounceWord() {
    const word = document.getElementById('popupWord').textContent;
    const utterance = new SpeechSynthesisUtterance(word);
    const voice = getSelectedVoice() || findPreferredVoice(speechSynthesis.getVoices());
    if (voice) {
        utterance.voice = voice;
        utterance.lang = voice.lang;
    } else {
        utterance.lang = 'en-US';
    }
    utterance.rate = 0.8;
    speechSynthesis.speak(utterance);
}

function togglePlay() {
    if (isPlaying) {
        speechSynthesis.pause();
        isPlaying = false;
        updatePlayButton();
    } else {
        if (speechSynthesis.paused) {
            speechSynthesis.resume();
            isPlaying = true;
            updatePlayButton();
        } else {
            startReading();
        }
    }
}

function startReading() {
    const article = articles[currentArticle];
    if (!article || !article.content) {
        showToast('❌ 文章内容为空');
        return;
    }
    
    speechSynthesis.cancel();
    isPlaying = true;
    updatePlayButton();
    
    playParagraph(0, true);
}

function stopReading() {
    speechSynthesis.cancel();
    isPlaying = false;
    currentParagraphIndex = -1;
    
    document.querySelectorAll('.paragraph-wrapper').forEach(wrapper => wrapper.classList.remove('playing'));
    document.querySelectorAll('.play-paragraph-btn').forEach(btn => btn.classList.remove('playing'));
    
    updatePlayButton();
}

function testSpeech() {
    speechSynthesis.cancel();
    
    const testText = 'Hello, this is a test.';
    const utterance = new SpeechSynthesisUtterance(testText);
    
    const voice = getSelectedVoice();
    if (voice) {
        utterance.voice = voice;
        utterance.lang = voice.lang;
    } else {
        utterance.lang = 'en-US';
    }
    utterance.rate = 1;
    utterance.volume = 1;
    utterance.pitch = 1;
    
    utterance.onstart = () => {
        console.log('测试语音开始播放');
        showToast('🔊 正在播放测试语音...');
    };
    
    utterance.onend = () => {
        console.log('测试语音播放结束');
        showToast('✅ 测试完成');
    };
    
    utterance.onerror = (e) => {
        console.error('测试语音错误:', e);
        showToast('❌ 播放失败: ' + e.error);
    };
    
    speechSynthesis.speak(utterance);
}

function updatePlayButton() {
    const icon = document.getElementById('playIcon');
    const text = document.getElementById('playText');
    if (isPlaying) {
        icon.textContent = '⏸';
        text.textContent = '暂停';
    } else {
        icon.textContent = '▶';
        text.textContent = '播放';
    }
}

function updateSpeed() {
    speechRate = parseFloat(document.getElementById('speedSelect').value);
    if (isPlaying) {
        stopReading();
        startReading();
    }
}

function getSelectedVoice() {
    const select = document.getElementById('voiceSelect');
    const selectedOption = select.options[select.selectedIndex];
    if (selectedOption && selectedOption.dataset.voiceIndex !== undefined) {
        const voices = speechSynthesis.getVoices();
        return voices[parseInt(selectedOption.dataset.voiceIndex)];
    }
    return null;
}

function updateVoice() {
    voiceLang = document.getElementById('voiceSelect').value;
}

function prevArticle() {
    if (currentArticle > 0) {
        stopReading();
        loadArticle(currentArticle - 1);
    }
}

function nextArticle() {
    if (currentArticle < articles.length - 1) {
        stopReading();
        loadArticle(currentArticle + 1);
    }
}

function updateStats() {
    const totalWords = Object.keys(wordStatuses).length;
    const mastered = Object.values(wordStatuses).filter(s => s === 'mastered').length;
    
    document.getElementById('wordCount').textContent = totalWords;
    document.getElementById('masteredCount').textContent = mastered;
    document.getElementById('completedCount').textContent = completedArticles.size;
}

function saveProgress() {
    localStorage.setItem('shadowReading_wordStatus', JSON.stringify(wordStatuses));
    localStorage.setItem('shadowReading_completed', JSON.stringify([...completedArticles]));
}

function loadProgress() {
    const savedStatus = localStorage.getItem('shadowReading_wordStatus');
    const savedCompleted = localStorage.getItem('shadowReading_completed');
    
    if (savedStatus) {
        wordStatuses = JSON.parse(savedStatus);
    }
    if (savedCompleted) {
        completedArticles = new Set(JSON.parse(savedCompleted));
    }
    
    updateStats();
}

function showToast(message) {
    const toast = document.getElementById('toast');
    toast.textContent = message;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2000);
}

function exportData() {
    const data = {
        wordStatuses: wordStatuses,
        completedArticles: [...completedArticles],
        exportDate: new Date().toISOString(),
        version: '1.0'
    };
    
    console.log('导出数据:', data);
    
    if (Object.keys(wordStatuses).length === 0 && completedArticles.size === 0) {
        showToast('⚠️ 没有学习数据可导出');
        return;
    }
    
    try {
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `shadow-reading-progress-${new Date().toISOString().slice(0,10)}.json`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        
        localStorage.setItem('shadowReading_lastBackup', Date.now().toString());
        showToast('✅ 学习数据已导出');
    } catch (e) {
        console.error('导出错误:', e);
        showToast('❌ 导出失败: ' + e.message);
    }
}

function handleImport(event) {
    const file = event.target.files[0];
    if (!file) return;
    
    console.log('导入文件:', file.name);
    
    const reader = new FileReader();
    reader.onload = (e) => {
        try {
            const data = JSON.parse(e.target.result);
            console.log('导入数据:', data);
            
            if (data.wordStatuses) {
                wordStatuses = data.wordStatuses;
            }
            if (data.completedArticles) {
                completedArticles = new Set(data.completedArticles);
            }
            saveProgress();
            updateStats();
            renderArticleList();
            loadArticle(currentArticle);
            showToast('✅ 学习数据已导入');
        } catch (err) {
            console.error('导入错误:', err);
            showToast('❌ 导入失败：文件格式错误');
        }
    };
    reader.onerror = (e) => {
        console.error('文件读取错误:', e);
        showToast('❌ 文件读取失败');
    };
    reader.readAsText(file);
    event.target.value = '';
}

document.addEventListener('click', (e) => {
    const popup = document.getElementById('wordPopup');
    if (popup.classList.contains('show') && !popup.contains(e.target) && !e.target.classList.contains('word')) {
        closePopup();
    }
});

document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closePopup();
    if (e.key === 'ArrowLeft') prevArticle();
    if (e.key === 'ArrowRight') nextArticle();
    if (e.key === ' ') { e.preventDefault(); togglePlay(); }
});

    </script>
</body>
</html>
