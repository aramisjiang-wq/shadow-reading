<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadow Reading — 英语影子学习</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Sans+SC:wght@400;500;600&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary:      #09090f;
            --bg-secondary:    #111119;
            --bg-card:         #17171f;
            --bg-hover:        #1f1f2c;
            --bg-elevated:     #1e1e2e;
            --accent-primary:  #00d4aa;
            --accent-dim:      rgba(0,212,170,0.12);
            --accent-gradient: linear-gradient(135deg,#00d4aa 0%,#00b4d8 100%);
            --text-primary:    #eeeef8;
            --text-secondary:  #9090a8;
            --text-muted:      #4a4a62;
            --success:         #00d4aa;
            --warning:         #f59e0b;
            --error:           #f87171;
            --border:          rgba(255,255,255,0.07);
            --border-accent:   rgba(0,212,170,0.28);
            --shadow-sm:       0 2px 8px rgba(0,0,0,0.35);
            --shadow-md:       0 8px 24px rgba(0,0,0,0.5);
            --shadow-lg:       0 20px 60px rgba(0,0,0,0.65);
            --r-sm: 6px; --r-md: 10px; --r-lg: 14px;
            --font-ui:      'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            --font-cn:      'Noto Sans SC', var(--font-ui);
            --font-reading: 'Lora', 'Georgia', serif;
            --font-mono:    'SF Mono','Fira Code','Consolas',monospace;
            --sidebar-width: 264px;
        }

        .theme-light {
            --bg-primary:      #f2f2f7;
            --bg-secondary:    #fafafa;
            --bg-card:         #ffffff;
            --bg-hover:        #ebebf0;
            --bg-elevated:     #ffffff;
            --accent-primary:  #009e80;
            --accent-dim:      rgba(0,158,128,0.1);
            --accent-gradient: linear-gradient(135deg,#009e80 0%,#0096b4 100%);
            --text-primary:    #0c0c1a;
            --text-secondary:  #44445e;
            --text-muted:      #8888a0;
            --border:          rgba(0,0,0,0.08);
            --border-accent:   rgba(0,158,128,0.22);
            --shadow-sm:       0 2px 8px rgba(0,0,0,0.08);
            --shadow-md:       0 8px 24px rgba(0,0,0,0.12);
            --shadow-lg:       0 20px 60px rgba(0,0,0,0.18);
            --success:         #009e80;
            --error:           #dc2626;
        }

        *,*::before,*::after { margin:0; padding:0; box-sizing:border-box; }

        body {
            font-family: var(--font-cn);
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        .app { display:flex; min-height:100vh; }

        /* ── Sidebar ── */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
            z-index: 100;
        }

        .sidebar-header {
            padding: 18px 14px 14px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .logo-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 14px;
        }

        .logo {
            font-family: var(--font-ui);
            font-size: 15px;
            font-weight: 600;
            letter-spacing: -0.3px;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo-mark {
            width: 26px; height: 26px;
            background: var(--accent-gradient);
            border-radius: 7px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .logo-mark svg { width:14px; height:14px; fill:#fff; }

        .theme-btn {
            width: 32px; height: 32px;
            border-radius: var(--r-sm);
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px;
            transition: all 0.15s;
        }
        .theme-btn:hover { background: var(--bg-hover); color: var(--text-primary); }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3,1fr);
            gap: 7px;
        }

        .stat {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--r-sm);
            padding: 10px 4px;
            text-align: center;
        }
        .stat-value {
            font-family: var(--font-ui);
            font-size: 20px;
            font-weight: 700;
            color: var(--accent-primary);
            line-height: 1;
        }
        .stat-label {
            font-size: 10.5px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .sidebar-tabs {
            display: flex;
            border-bottom: 1px solid var(--border);
            padding: 0 8px;
            flex-shrink: 0;
        }
        .sidebar-tab {
            flex: 1;
            padding: 11px 4px;
            text-align: center;
            font-size: 12.5px;
            font-family: var(--font-ui);
            color: var(--text-muted);
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.15s;
        }
        .sidebar-tab:hover { color: var(--text-secondary); }
        .sidebar-tab.active { color: var(--accent-primary); border-bottom-color: var(--accent-primary); font-weight: 500; }

        .article-list,.word-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }
        .article-list::-webkit-scrollbar,.word-list::-webkit-scrollbar { width:3px; }
        .article-list::-webkit-scrollbar-thumb,.word-list::-webkit-scrollbar-thumb { background:var(--bg-hover); border-radius:2px; }

        .article-item {
            padding: 8px 10px;
            border-radius: var(--r-sm);
            cursor: pointer;
            display: flex; align-items: center; gap: 9px;
            margin-bottom: 2px;
            font-size: 12.5px;
            color: var(--text-secondary);
            transition: all 0.12s;
        }
        .article-item:hover { background: var(--bg-hover); color: var(--text-primary); }
        .article-item.active { background: var(--accent-dim); color: var(--accent-primary); }
        .article-item.completed { color: var(--success); }

        .article-badge {
            width: 22px; height: 22px;
            border-radius: 5px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            display: flex; align-items: center; justify-content: center;
            font-family: var(--font-ui);
            font-size: 10px; font-weight: 600;
            flex-shrink: 0;
            transition: all 0.15s;
        }
        .article-item.completed .article-badge { background: var(--success); border-color: var(--success); color: #fff; }
        .article-item.active    .article-badge { border-color: var(--accent-primary); color: var(--accent-primary); }

        .word-item {
            padding: 10px 12px;
            background: var(--bg-card);
            border-radius: var(--r-sm);
            margin-bottom: 6px;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.12s;
        }
        .word-item:hover { border-color: var(--accent-primary); background: var(--bg-hover); }
        .word-item-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
        .word-item-word { font-size: 14px; font-weight: 500; }
        .word-item-status { font-size: 10px; padding: 2px 7px; border-radius: 8px; font-family: var(--font-ui); }
        .word-item-status.unknown  { background:var(--bg-hover); color:var(--text-muted); }
        .word-item-status.mastered { background:rgba(0,212,170,0.15); color:var(--success); }
        .word-item-status.review   { background:rgba(248,113,113,0.15); color:var(--error); }
        .word-item-def     { font-size: 12px; color: var(--text-secondary); margin-bottom: 2px; }
        .word-item-phonetic { font-size: 11px; color: var(--text-muted); font-family: var(--font-mono); }

        .sidebar-footer {
            padding: 8px;
            border-top: 1px solid var(--border);
            flex-shrink: 0;
        }

        .footer-link {
            display: flex; align-items: center; gap: 8px;
            padding: 9px 12px;
            border-radius: var(--r-sm);
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 13px;
            transition: all 0.15s;
            margin-bottom: 8px;
        }
        .footer-link:hover { border-color: var(--border-accent); color: var(--accent-primary); background: var(--accent-dim); }

        .tips-box {
            padding: 10px 12px;
            background: linear-gradient(135deg, var(--accent-dim), rgba(124,58,237,0.07));
            border-radius: var(--r-sm);
            border: 1px solid var(--border);
        }
        .tips-title { font-size: 10.5px; font-weight: 600; color: var(--accent-primary); margin-bottom: 7px; text-transform: uppercase; letter-spacing: 0.5px; }
        .tips-rows { display: flex; flex-direction: column; gap: 4px; }
        .tips-row { display: flex; align-items: center; gap: 7px; }
        .tips-key { font-family: var(--font-mono); font-size: 9.5px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 3px; padding: 1px 5px; color: var(--text-secondary); white-space: nowrap; }
        .tips-desc { font-size: 11px; color: var(--text-muted); }

        /* ── Main ── */
        .main {
            flex: 1;
            margin-left: var(--sidebar-width);
            padding: 28px 52px;
            max-width: calc(var(--sidebar-width) + 880px);
        }

        .header { margin-bottom: 20px; }
        .title-row { display:flex; align-items:flex-start; justify-content:space-between; gap:16px; }
        .article-title { font-family:var(--font-ui); font-size:22px; font-weight:700; letter-spacing:-0.4px; }
        .article-subtitle { font-size:13px; color:var(--text-muted); margin-top:4px; }
        .progress-pill {
            font-family: var(--font-mono);
            font-size: 12px;
            color: var(--text-muted);
            padding: 4px 11px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            white-space: nowrap;
            flex-shrink: 0;
            margin-top: 4px;
        }

        /* ── Controls ── */
        .controls {
            display: flex;
            align-items: center;
            gap: 5px;
            margin-bottom: 14px;
            flex-wrap: wrap;
        }
        .ctrl-group { display:flex; align-items:center; gap:4px; }
        .ctrl-sep { width:1px; height:22px; background:var(--border); margin:0 4px; }

        .btn {
            padding: 7px 13px;
            border-radius: var(--r-sm);
            border: 1px solid var(--border);
            background: var(--bg-card);
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 500;
            font-family: var(--font-ui);
            cursor: pointer;
            display: inline-flex; align-items: center; gap: 6px;
            transition: all 0.12s;
            white-space: nowrap;
        }
        .btn:hover { background:var(--bg-hover); color:var(--text-primary); border-color:rgba(255,255,255,0.12); }
        .btn:active { transform:scale(0.97); }
        .btn:disabled { opacity:0.38; cursor:not-allowed; }
        .btn:disabled:hover { transform:none; }

        .btn-primary {
            background: var(--accent-gradient);
            color: #fff;
            border-color: transparent;
            padding: 7px 18px;
            font-size: 13.5px;
            box-shadow: 0 2px 10px var(--accent-dim);
        }
        .btn-primary:hover { opacity:0.88; box-shadow:0 4px 16px var(--accent-dim); }

        .btn-icon { padding:7px 9px; }

        .btn.active {
            background: var(--accent-dim);
            color: var(--accent-primary);
            border-color: var(--border-accent);
        }
        .btn.recording {
            background: rgba(248,113,113,0.14);
            color: var(--error);
            border-color: rgba(248,113,113,0.3);
        }

        .select-wrap {
            display: flex; align-items: center; gap: 5px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--r-sm);
            padding: 5px 10px;
        }
        .select-wrap label { font-size:11.5px; color:var(--text-muted); font-family:var(--font-ui); white-space:nowrap; }
        .select-wrap select {
            background: transparent; border: none;
            color: var(--text-primary);
            font-size: 12.5px; font-family: var(--font-ui);
            cursor: pointer; outline: none;
            max-width: 120px;
        }

        /* ── Progress bar ── */
        .progress-track {
            height: 3px;
            background: var(--bg-hover);
            border-radius: 2px;
            margin-bottom: 18px;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            background: var(--accent-gradient);
            border-radius: 2px;
            transition: width 0.4s cubic-bezier(0.4,0,0.2,1);
        }

        /* ── Article content ── */
        .content {
            background: var(--bg-card);
            border-radius: var(--r-lg);
            padding: 32px 40px;
            border: 1px solid var(--border);
        }

        .paragraph-wrapper { margin-bottom: 22px; position: relative; }
        .paragraph-wrapper:last-child { margin-bottom: 0; }

        .paragraph-wrapper.playing {
            background: linear-gradient(135deg,rgba(0,212,170,0.07),rgba(0,180,216,0.06));
            border-radius: var(--r-md);
            padding: 14px 16px;
            margin: -14px -16px;
            margin-bottom: 8px;
            border-left: 3px solid var(--accent-primary);
        }

        .para-header { display:flex; align-items:center; gap:6px; margin-bottom:8px; }

        .play-para-btn {
            width: 26px; height: 26px;
            border-radius: 5px;
            background: var(--bg-hover);
            border: 1px solid var(--border);
            color: var(--text-muted);
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 10px;
            transition: all 0.12s;
            flex-shrink: 0;
        }
        .play-para-btn:hover { background:var(--accent-primary); color:#fff; border-color:var(--accent-primary); }
        .play-para-btn.playing { background:var(--accent-primary); color:#fff; border-color:var(--accent-primary); }

        .para-num {
            font-family: var(--font-mono);
            font-size: 10px;
            color: var(--text-muted);
            background: var(--bg-hover);
            padding: 2px 7px;
            border-radius: 4px;
        }

        .content p {
            font-family: var(--font-reading);
            font-size: 17px;
            line-height: 1.92;
            color: var(--text-primary);
            text-align: justify;
            hyphens: auto;
        }

        /* ── Words ── */
        .word {
            cursor: pointer;
            border-radius: 3px;
            padding: 1px 1px;
            transition: background 0.1s, color 0.1s;
        }
        .word:hover { background:var(--accent-dim); color:var(--accent-primary); }
        .word.mastered { color:var(--success); }
        .word.review   { color:var(--error); }
        .word.playing  { background:var(--accent-primary); color:var(--bg-primary); border-radius:4px; padding:1px 3px; }

        /* ── Translation ── */
        .translation {
            font-family: var(--font-cn);
            background: var(--bg-hover);
            border-left: 3px solid var(--accent-primary);
            padding: 11px 15px;
            margin-top: 10px;
            border-radius: 0 var(--r-sm) var(--r-sm) 0;
            font-size: 13.5px;
            line-height: 1.8;
            color: var(--text-secondary);
            display: none;
        }
        .translation.show { display: block; }

        /* ── Practice panel ── */
        .practice-panel {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--r-lg);
            padding: 22px 24px;
            margin-top: 14px;
            display: none;
        }
        .practice-panel.show { display: block; }
        .practice-title { font-size:13.5px; font-weight:600; font-family:var(--font-ui); margin-bottom:5px; }
        .practice-desc  { font-size:13px; color:var(--text-muted); margin-bottom:14px; }
        .practice-timer {
            font-family: var(--font-mono);
            font-size: 38px;
            font-weight: 700;
            color: var(--accent-primary);
            text-align: center;
            margin: 12px 0;
            letter-spacing: 3px;
        }
        .practice-actions { display:flex; gap:8px; justify-content:center; flex-wrap:wrap; }
        .practice-status { text-align:center; margin-top:12px; font-size:13px; color:var(--text-secondary); }

        .practice-mode .paragraph-wrapper p {
            color: transparent;
            text-shadow: 0 0 10px var(--text-muted);
            user-select: none;
        }
        .practice-mode .paragraph-wrapper:hover p { color:var(--text-primary); text-shadow:none; }
        .practice-mode .word { pointer-events: none; }

        .recording-indicator { display:inline-flex; align-items:center; gap:7px; color:var(--error); font-weight:500; }
        .rec-dot { width:8px; height:8px; background:var(--error); border-radius:50%; animation:rec-pulse 1.2s ease-in-out infinite; }
        @keyframes rec-pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.75)} }

        /* ── Nav row ── */
        .nav-row { display:flex; justify-content:space-between; margin-top:18px; }

        /* ── Word popup ── */
        .popup-backdrop { position:fixed; inset:0; z-index:999; display:none; }
        .popup-backdrop.show { display:block; }

        .word-popup {
            position: fixed;
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: var(--r-lg);
            padding: 18px 20px;
            width: 316px;
            z-index: 1000;
            box-shadow: var(--shadow-lg);
            opacity: 0;
            transform: translateY(5px) scale(0.96);
            transition: opacity 0.17s ease, transform 0.17s ease;
            pointer-events: none;
        }
        .word-popup.show { opacity:1; transform:translateY(0) scale(1); pointer-events:auto; }

        .popup-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:12px; }
        .popup-word { font-family:var(--font-reading); font-size:24px; font-weight:600; letter-spacing:-0.5px; }
        .popup-phonetic { font-family:var(--font-mono); font-size:12px; color:var(--text-muted); margin-top:3px; }
        .popup-speak {
            width:34px; height:34px; border-radius:50%;
            background:var(--accent-primary); border:none;
            color:var(--bg-primary); cursor:pointer; font-size:14px;
            display:flex; align-items:center; justify-content:center;
            transition:all 0.12s; flex-shrink:0;
        }
        .popup-speak:hover { transform:scale(1.1); }

        .popup-pos {
            font-family: var(--font-ui);
            font-size: 11px;
            color: var(--accent-primary);
            background: var(--accent-dim);
            padding: 2px 7px;
            border-radius: 4px;
            margin-right: 7px;
            font-weight: 500;
        }
        .popup-def { font-size:14.5px; color:var(--text-primary); line-height:1.5; margin-bottom:10px; }
        .popup-example {
            font-family:var(--font-reading);
            font-style:italic;
            font-size:12.5px;
            color:var(--text-secondary);
            background:var(--bg-card);
            padding:9px 12px;
            border-radius:var(--r-sm);
            line-height:1.5;
        }

        .popup-status-row {
            display:flex; gap:7px;
            margin-top:12px; padding-top:12px;
            border-top:1px solid var(--border);
        }
        .status-btn {
            flex:1; padding:7px 4px;
            border-radius:var(--r-sm);
            border:1px solid var(--border);
            background:var(--bg-card);
            color:var(--text-secondary);
            font-size:11.5px; font-family:var(--font-ui);
            cursor:pointer; transition:all 0.12s;
        }
        .status-btn:hover { border-color:rgba(255,255,255,0.15); }
        .status-btn.unknown.active  { background:var(--bg-hover); color:var(--text-secondary); border-color:rgba(255,255,255,0.15); }
        .status-btn.mastered.active { background:rgba(0,212,170,0.15); color:var(--success); border-color:var(--border-accent); }
        .status-btn.review.active   { background:rgba(248,113,113,0.14); color:var(--error); border-color:rgba(248,113,113,0.3); }

        /* ── Keyboard shortcut overlay ── */
        .kbd-overlay {
            position:fixed; inset:0;
            background:rgba(0,0,0,0.55);
            backdrop-filter:blur(5px);
            -webkit-backdrop-filter:blur(5px);
            z-index:2000;
            display:flex; align-items:center; justify-content:center;
            opacity:0; pointer-events:none;
            transition:opacity 0.2s;
        }
        .kbd-overlay.show { opacity:1; pointer-events:auto; }
        .kbd-panel {
            background:var(--bg-elevated);
            border:1px solid var(--border);
            border-radius:var(--r-lg);
            padding:28px 32px;
            width:380px;
            box-shadow:var(--shadow-lg);
        }
        .kbd-header { font-family:var(--font-ui); font-size:15px; font-weight:600; margin-bottom:18px; }
        .kbd-row { display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid var(--border); }
        .kbd-row:last-child { border-bottom:none; }
        .kbd-desc { font-size:13px; color:var(--text-secondary); }
        kbd {
            font-family:var(--font-mono); font-size:11px;
            background:var(--bg-hover);
            border:1px solid var(--border); border-bottom:2px solid var(--border);
            border-radius:5px; padding:3px 8px; color:var(--text-primary);
        }

        /* ── Toast ── */
        .toast {
            position:fixed; bottom:26px; right:26px;
            background:var(--bg-elevated);
            color:var(--text-primary);
            padding:10px 18px;
            border-radius:var(--r-md);
            border:1px solid var(--border);
            font-size:13px; font-family:var(--font-ui);
            box-shadow:var(--shadow-md);
            opacity:0; transform:translateY(6px);
            transition:all 0.25s cubic-bezier(0.4,0,0.2,1);
            z-index:3000; pointer-events:none;
        }
        .toast.show { opacity:1; transform:translateY(0); }

        .empty-state { text-align:center; padding:36px 16px; color:var(--text-muted); }
        .empty-icon  { font-size:32px; margin-bottom:8px; }
        .empty-text  { font-size:13px; }

        /* ── Mobile ── */
        @media (max-width:768px) {
            .sidebar { width:100%; height:auto; position:relative; border-right:none; border-bottom:1px solid var(--border); max-height:42vh; }
            .app { flex-direction:column; }
            .main { margin-left:0; padding:16px 18px; }
            .content { padding:20px; }
            .title-row { flex-direction:column; align-items:flex-start; gap:6px; }
            .stats-grid { display:none; }
            .sidebar-footer { display:none; }
            .ctrl-sep { display:none; }
            .controls { gap:4px; }
        }
    </style>
</head>
<body>
<div class="app">

    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="logo-row">
                <div class="logo">
                    <div class="logo-mark">
                        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/>
                        </svg>
                    </div>
                    Shadow Reading
                </div>
                <button class="theme-btn" id="themeBtn" onclick="toggleTheme()" title="切换主题">🌙</button>
            </div>

                <div class="stat"><div class="stat-value" id="completedCount">0</div><div class="stat-label">已完成</div></div>
                <div class="stat"><div class="stat-value" id="wordCount">0</div><div class="stat-label">已学词</div></div>
                <div class="stat"><div class="stat-value" id="masteredCount">0</div><div class="stat-label">已掌握</div></div>
            </div>
        </div>

        <div class="sidebar-tabs">
            <div class="sidebar-tab active" id="tabArticles" onclick="switchTab('articles')">📚 文章</div>
            <div class="sidebar-tab" id="tabWords" onclick="switchTab('words')">📝 生词本</div>
        </div>

        <div class="article-list" id="articleList"></div>
        <div class="word-list" id="wordList" style="display:none"></div>

        <div class="sidebar-footer">
            <a href="words.html" class="footer-link">📚 全部单词本</a>
            <div class="tips-box">
                <div class="tips-title">快捷键</div>
                <div class="tips-rows">
                    <div class="tips-row"><span class="tips-key">Space</span><span class="tips-desc">播放 / 暂停</span></div>
                    <div class="tips-row"><span class="tips-key">← →</span><span class="tips-desc">切换文章</span></div>
                    <div class="tips-row"><span class="tips-key">T</span><span class="tips-desc">显示翻译</span></div>
                    <div class="tips-row"><span class="tips-key">?</span><span class="tips-desc">所有快捷键</span></div>
                </div>

        </div>
    </aside>

    <main class="main">
        <div class="header">
            <div class="title-row">
                <div>
                    <h1 class="article-title" id="articleTitle">Loading…</h1>
                    <div class="article-subtitle" id="articleSubtitle"></div>
                </div>
                <span class="progress-pill" id="progressPill">1 / 20</span>

        <div class="controls">
            <div class="ctrl-group">
                <button class="btn btn-primary" id="playBtn" onclick="togglePlay()">

            <div class="ctrl-group">
                <div class="select-wrap">
                    <label>速度</label>
                    <select id="speedSelect" onchange="updateSpeed()">
                        <option value="0.5">0.5×</option>

                        <option value="1.25">1.25×</option>

                <button class="btn" id="playRecordingBtn" onclick="playRecording()" disabled>▶️ 播放录音</button>

</div>

<!-- Word popup -->
<div class="popup-backdrop" id="popupBackdrop" onclick="closePopup()"></div>

    <div class="popup-header">
        <div>
            <div class="popup-word" id="popupWord"></div>

        <button class="popup-speak" onclick="pronounceWord()" title="发音">🔊</button>

        <button class="status-btn unknown" onclick="setWordStatus('unknown')">○ 不认识</button>
        <button class="status-btn mastered" onclick="setWordStatus('mastered')">✓ 已掌握</button>

    </div>
</div>

<!-- Keyboard shortcuts overlay -->
<div class="kbd-overlay" id="kbdOverlay" onclick="hideShortcuts()">
    <div class="kbd-panel" onclick="event.stopPropagation()">
        <div class="kbd-header">⌨️ 键盘快捷键</div>
        <div class="kbd-row"><span class="kbd-desc">播放 / 暂停</span><kbd>Space</kbd></div>
        <div class="kbd-row"><span class="kbd-desc">停止播放</span><kbd>S</kbd></div>
        <div class="kbd-row"><span class="kbd-desc">上一篇文章</span><kbd>←</kbd></div>
        <div class="kbd-row"><span class="kbd-desc">下一篇文章</span><kbd>→</kbd></div>
        <div class="kbd-row"><span class="kbd-desc">显示 / 隐藏翻译</span><kbd>T</kbd></div>
        <div class="kbd-row"><span class="kbd-desc">关闭弹窗</span><kbd>Esc</kbd></div>
        <div class="kbd-row"><span class="kbd-desc">查看此列表</span><kbd>?</kbd></div>
    </div>
</div>

<div class="toast" id="toast"></div>
<input type="file" id="importFile" accept=".json" style="display:none" onchange="handleImport(event)">

<script src="articles-data.js"></script>
<script src="dictionary-data.js"></script>
<script>
// ── Constants ──
const LS = {
    WORD_STATUS:  'sr_wordStatus',
    COMPLETED:    'sr_completed',
    THEME:        'sr_theme',
    ARTICLE:      'sr_article',
    SPEED:        'sr_speed',
    LAST_BACKUP:  'sr_lastBackup',
};
const BACKUP_INTERVAL = 7 * 24 * 60 * 60 * 1000;

// ── State ──
let currentArticle   = 0;
let isPlaying        = false;
let currentUtterance = null;
let speechRate       = 1;
let completedArticles  = new Set();
let wordStatuses       = {};
let currentWord        = '';
let currentTab         = 'articles';
let showTranslation    = false;
let currentParaIdx     = -1;
let practiceMode       = false;
let mediaRecorder      = null;
let recordedChunks     = [];
let recordedBlob       = null;
let recordingStart     = null;
let timerInterval      = null;

// ── Init ──
function init() {
    loadTheme();
    loadProgress();
    loadSettings();
    renderArticleList();
    const target = getInitialTarget();
    loadArticle(target.articleIndex);
    loadVoices();
    checkBackupReminder();
    if (target.paragraphIndex !== null) {
        setTimeout(() => jumpToParagraph(target.paragraphIndex), 150);
    }
}

function getInitialTarget() {
    const params = new URLSearchParams(window.location.search);
    const a = parseInt(params.get('article'), 10);
    const p = parseInt(params.get('paragraph'), 10);
    const saved = parseInt(localStorage.getItem(LS.ARTICLE), 10);
    const articleIdx = (Number.isInteger(a) && a >= 1 && a <= articles.length)
        ? a - 1
        : (Number.isInteger(saved) && saved >= 0 && saved < articles.length ? saved : 0);
    const paraIdx = (Number.isInteger(p) && p >= 1) ? p - 1 : null;
    return { articleIndex: articleIdx, paragraphIndex: paraIdx };
}

function jumpToParagraph(idx) {
    const el = document.querySelector(`.paragraph-wrapper[data-index="${idx}"]`);
    if (!el) return;
    el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    el.classList.add('playing');
    setTimeout(() => el.classList.remove('playing'), 1500);
}

// ── Theme ──
function loadTheme() {
    if (localStorage.getItem(LS.THEME) === 'light') {
        document.body.classList.add('theme-light');
        document.getElementById('themeBtn').textContent = '☀️';
    }
}

function toggleTheme() {
    const light = document.body.classList.toggle('theme-light');
    document.getElementById('themeBtn').textContent = light ? '☀️' : '🌙';
    localStorage.setItem(LS.THEME, light ? 'light' : 'dark');
}

// ── Settings ──
function loadSettings() {
    const spd = parseFloat(localStorage.getItem(LS.SPEED));
    if (!isNaN(spd)) {
        speechRate = spd;
        document.getElementById('speedSelect').value = spd;
    }
}

// ── Progress ──
function loadProgress() {
    const ws = localStorage.getItem(LS.WORD_STATUS);
    const ca = localStorage.getItem(LS.COMPLETED);
    if (ws) wordStatuses    = JSON.parse(ws);
    if (ca) completedArticles = new Set(JSON.parse(ca));
    updateStats();
}

function saveProgress() {
    localStorage.setItem(LS.WORD_STATUS, JSON.stringify(wordStatuses));
    localStorage.setItem(LS.COMPLETED,   JSON.stringify([...completedArticles]));
}

function checkBackupReminder() {
    const last = parseInt(localStorage.getItem(LS.LAST_BACKUP), 10) || 0;
    const count = Object.values(wordStatuses).filter(s => s === 'mastered').length;
    if (count > 10 && (Date.now() - last) > BACKUP_INTERVAL) {
        setTimeout(() => showToast('💡 建议导出备份，防止数据丢失'), 4000);
    }
}

// ── Stats ──
function updateStats() {
    const total    = Object.keys(wordStatuses).length;
    const mastered = Object.values(wordStatuses).filter(s => s === 'mastered').length;
    document.getElementById('wordCount').textContent     = total;
    document.getElementById('masteredCount').textContent = mastered;
    document.getElementById('completedCount').textContent = completedArticles.size;
}

// ── Voices ──
function loadVoices() {
    const voices = speechSynthesis.getVoices();
    const sel = document.getElementById('voiceSelect');
    sel.innerHTML = '';

    const groups = [
        { label: 'English', list: voices.filter(v => v.lang.startsWith('en')) },
        { label: '中文',    list: voices.filter(v => v.lang.startsWith('zh')) },
    ];

    groups.forEach(({ label, list }) => {
        if (!list.length) return;
        const g = document.createElement('optgroup');
        g.label = label;
        list.forEach(v => {
            const o = document.createElement('option');
            o.value = v.name;
            o.textContent = v.name;
            o.dataset.voiceIndex = voices.indexOf(v);
            g.appendChild(o);
        });
        sel.appendChild(g);
    });

    if (!sel.options.length) {
        sel.innerHTML = '<option value="">默认</option>';
        return;
    }

    const preferred = findPreferredVoice(voices);
    if (preferred) {
        const idx = voices.indexOf(preferred);
        const opt = [...sel.options].find(o => parseInt(o.dataset.voiceIndex) === idx);
        if (opt) sel.value = opt.value;
    }
}

function findPreferredVoice(voices) {
    return voices.find(v => v.name === 'Google US English')
        || voices.find(v => v.lang === 'en-US')
        || voices.find(v => v.lang.startsWith('en'))
        || null;
}

if (speechSynthesis.onvoiceschanged !== undefined) {
    speechSynthesis.onvoiceschanged = loadVoices;
}

function getSelectedVoice() {
    const sel = document.getElementById('voiceSelect');
    const opt = sel.options[sel.selectedIndex];
    if (opt?.dataset.voiceIndex !== undefined) {
        return speechSynthesis.getVoices()[parseInt(opt.dataset.voiceIndex)] || null;
    }
    return null;
}

function updateVoice() { /* applied on next speech */ }

// ── Article list ──
function renderArticleList() {
    document.getElementById('articleList').innerHTML = articles.map((a, i) => `
        <div class="article-item ${i === currentArticle ? 'active' : ''} ${completedArticles.has(i) ? 'completed' : ''}"
            onclick="loadArticle(${i})">
            <span class="article-badge">${completedArticles.has(i) ? '✓' : i + 1}</span>
            <span>${a.title}</span>
        </div>
    `).join('');
}

function scrollSidebarToActive() {
    document.querySelector('.article-item.active')?.scrollIntoView({ block: 'nearest' });
}

// ── Load article ──
function loadArticle(index) {
    currentArticle = index;
    localStorage.setItem(LS.ARTICLE, index);
    const article = articles[index];

    document.getElementById('articleTitle').textContent    = article.title;
    document.getElementById('articleSubtitle').textContent = article.subtitle;
    document.getElementById('progressPill').textContent    = `${index + 1} / ${articles.length}`;
    document.getElementById('progressBar').style.width     = ((index + 1) / articles.length * 100) + '%';
    document.getElementById('prevBtn').disabled = index === 0;
    document.getElementById('nextBtn').disabled = index === articles.length - 1;

    const paragraphs   = article.content.split('\n\n');
    const translations = article.translation ? article.translation.split('\n\n') : [];

    document.getElementById('articleContent').innerHTML = paragraphs.map((p, i) => {
        const words = p.split(/(\s+)/).map(token => {
            const clean = token.toLowerCase()
                .replace(/^[^a-z]+/, '').replace(/[^a-z]+$/, '');
            if (clean.length > 1 && /^[a-z]+$/.test(clean)) {
                const st = wordStatuses[clean] || '';
                return `<span class="word ${st}" data-word="${clean}" onclick="showWordPopup(event,'${clean}')">${token}</span>`;
            }
            return token;
        }).join('');

        const trans = translations[i] || '';
        return `
            <div class="paragraph-wrapper" data-index="${i}">
                <div class="para-header">
                    <button class="play-para-btn" onclick="playParagraph(${i})" title="播放此段">▶</button>
                    <span class="para-num">P${i + 1}</span>
                </div>
                <p>${words}</p>
                ${trans ? `<div class="translation${showTranslation ? ' show' : ''}">${trans}</div>` : ''}
            </div>
        `;
    }).join('');

    renderArticleList();
    setTimeout(scrollSidebarToActive, 50);
}

// ── Playback ──
function togglePlay() {
    if (isPlaying) {
        speechSynthesis.pause();
        isPlaying = false;
    } else if (speechSynthesis.paused) {
        speechSynthesis.resume();
        isPlaying = true;
    } else {
        startReading();
        return;
    }
    updatePlayButton();
}

function startReading() {
    if (!articles[currentArticle]?.content) return showToast('❌ 文章内容为空');
    speechSynthesis.cancel();
    isPlaying = true;
    updatePlayButton();
    playParagraph(0, true);
}

function stopReading() {
    speechSynthesis.cancel();
    isPlaying = false;
    currentParaIdx = -1;
    document.querySelectorAll('.paragraph-wrapper.playing').forEach(el => el.classList.remove('playing'));
    document.querySelectorAll('.play-para-btn.playing').forEach(el => el.classList.remove('playing'));
    updatePlayButton();
}

function playParagraph(index, autoContinue = false) {
    const paragraphs = articles[currentArticle].content.split('\n\n');
    if (index < 0 || index >= paragraphs.length) {
        if (autoContinue) {
            stopReading();
            completedArticles.add(currentArticle);
            saveProgress();
            renderArticleList();
            updateStats();
            showToast('🎉 完成！文章已标记完成');
        }
        return;
    }

    if (!autoContinue) stopReading();

    document.querySelectorAll('.paragraph-wrapper').forEach(el => el.classList.remove('playing'));
    document.querySelectorAll('.play-para-btn').forEach(el => el.classList.remove('playing'));

    const wrapper = document.querySelector(`.paragraph-wrapper[data-index="${index}"]`);
    const btn     = wrapper?.querySelector('.play-para-btn');
    wrapper?.classList.add('playing');
    btn?.classList.add('playing');
    wrapper?.scrollIntoView({ behavior: 'smooth', block: 'center' });

    currentParaIdx = index;
    isPlaying = true;
    updatePlayButton();

    const utt   = new SpeechSynthesisUtterance(paragraphs[index]);
    const voice = getSelectedVoice();
    utt.voice   = voice || null;
    utt.lang    = voice?.lang || 'en-US';
    utt.rate    = speechRate;
    utt.volume  = 1;

    utt.onend = () => {
        wrapper?.classList.remove('playing');
        btn?.classList.remove('playing');
        currentParaIdx = -1;
        if (autoContinue && isPlaying) playParagraph(index + 1, true);
        else { isPlaying = false; updatePlayButton(); }
    };

    utt.onerror = () => {
        wrapper?.classList.remove('playing');
        btn?.classList.remove('playing');
        currentParaIdx = -1;
        isPlaying = false;
        updatePlayButton();
    };

    currentUtterance = utt;
    speechSynthesis.speak(utt);
}

function playOriginal() {
    const article = articles[currentArticle];
    stopReading();
    const utt   = new SpeechSynthesisUtterance(article.content);
    const voice = getSelectedVoice();
    utt.voice  = voice || null;
    utt.lang   = voice?.lang || 'en-US';
    utt.rate   = speechRate;
    utt.onend  = () => { isPlaying = false; updatePlayButton(); };
    utt.onerror = () => { isPlaying = false; updatePlayButton(); };
    isPlaying = true;
    updatePlayButton();
    currentUtterance = utt;
    speechSynthesis.speak(utt);
}

function updatePlayButton() {
    document.getElementById('playIcon').textContent = isPlaying ? '⏸' : '▶';
    document.getElementById('playText').textContent = isPlaying ? '暂停' : '播放';
}

function updateSpeed() {
    speechRate = parseFloat(document.getElementById('speedSelect').value);
    localStorage.setItem(LS.SPEED, speechRate);
    if (isPlaying) { stopReading(); startReading(); }
}

function testSpeech() {
    speechSynthesis.cancel();
    const utt   = new SpeechSynthesisUtterance('Hello, this is a test of the speech synthesis.');
    const voice = getSelectedVoice();
    utt.voice  = voice || null;
    utt.lang   = voice?.lang || 'en-US';
    utt.rate   = speechRate;
    utt.onstart = () => showToast('🔊 测试中…');
    utt.onend   = () => showToast('✅ 语音测试完成');
    utt.onerror = e => showToast('❌ 播放失败: ' + e.error);
    speechSynthesis.speak(utt);
}

// ── Navigation ──
function prevArticle() {
    if (currentArticle > 0) { stopReading(); loadArticle(currentArticle - 1); }
}

function nextArticle() {
    if (currentArticle < articles.length - 1) { stopReading(); loadArticle(currentArticle + 1); }
}

// ── Tabs ──
function switchTab(tab) {
    currentTab = tab;
    document.getElementById('tabArticles').classList.toggle('active', tab === 'articles');
    document.getElementById('tabWords').classList.toggle('active', tab === 'words');
    document.getElementById('articleList').style.display = tab === 'articles' ? 'block' : 'none';
    document.getElementById('wordList').style.display    = tab === 'words'    ? 'block' : 'none';
    if (tab === 'words') renderWordList();
}

// ── Word list in sidebar ──
function renderWordList() {
    const list  = document.getElementById('wordList');
    const words = Object.keys(wordStatuses).filter(w => dictionary[w]);
    if (!words.length) {
        list.innerHTML = '<div class="empty-state"><div class="empty-icon">📝</div><div class="empty-text">点击文章中的单词开始学习</div></div>';
        return;
    }
    const labelMap = { unknown:'不认识', mastered:'已掌握', review:'需复习' };
    list.innerHTML = words.map(word => {
        const status = wordStatuses[word] || 'unknown';
        const data   = dictionary[word];
        return `
            <div class="word-item" onclick="showWordFromList('${word}')">
                <div class="word-item-header">
                    <span class="word-item-word">${word}</span>
                    <span class="word-item-status ${status}">${labelMap[status] || status}</span>
                </div>
                <div class="word-item-def">${data?.def || '暂无释义'}</div>
                <div class="word-item-phonetic">${data?.phonetic || ''}</div>
            </div>
        `;
    }).join('');
}

// ── Word popup ──
function showWordFromList(word) {
    const data = dictionary[word];
    if (!data) return;
    fillPopup(word, data.phonetic || '', data.pos || '', data.def || '暂无释义', data.example || '');
    currentWord = word;
    updateStatusButtons();
    const popup = document.getElementById('wordPopup');
    popup.style.cssText = 'left:50%; top:50%; transform:translate(-50%,-50%)';
    popup.classList.add('show');
    document.getElementById('popupBackdrop').classList.add('show');
}

function showWordPopup(event, word) {
    event.stopPropagation();
    const wordData = getWordDataWithFallback(word, event.target);
    fillPopup(word, wordData.phonetic, wordData.pos, wordData.def, wordData.example);
    currentWord = word;
    if (!wordStatuses[word]) wordStatuses[word] = 'unknown';
    updateStatusButtons();

    // Use clientY (viewport-relative) since popup is position:fixed
    const x = Math.min(event.clientX, window.innerWidth - 326);
    const y = Math.min(event.clientY + 12, window.innerHeight - 240);
    const popup = document.getElementById('wordPopup');
    popup.style.left      = x + 'px';
    popup.style.top       = y + 'px';
    popup.style.transform = '';
    popup.classList.add('show');
    document.getElementById('popupBackdrop').classList.add('show');

    saveProgress();
    updateStats();
}

function fillPopup(word, phonetic, pos, def, example) {
    document.getElementById('popupWord').textContent     = word;
    document.getElementById('popupPhonetic').textContent = phonetic;
    document.getElementById('popupPos').textContent      = pos;
    document.getElementById('popupDef').textContent      = def;
    document.getElementById('popupExample').textContent  = example ? `"${example}"` : '';
}

function getWordDataWithFallback(word, el) {
    const direct = dictionary[word];
    if (direct) return { phonetic: direct.phonetic || '', pos: direct.pos || '', def: direct.def || '暂无释义', example: direct.example || '' };

    for (const c of getWordCandidates(word)) {
        if (dictionary[c]) {
            const m = dictionary[c];
            return { phonetic: m.phonetic || '', pos: m.pos || '', def: `${m.def}（原形：${c}）`, example: m.example || '' };
        }
    }

    const ctx = getContextualDef(el);
    return { phonetic: '', pos: '', def: ctx || '暂无释义', example: '' };
}

function getWordCandidates(word) {
    const s = new Set();
    const w = (word || '').toLowerCase();
    if (!w) return [];
    s.add(w);
    if (w.endsWith('ies') && w.length > 3) s.add(w.slice(0, -3) + 'y');
    if (w.endsWith('es')  && w.length > 2) s.add(w.slice(0, -2));
    if (w.endsWith('s')   && w.length > 1) s.add(w.slice(0, -1));
    if (w.endsWith('ied') && w.length > 3) s.add(w.slice(0, -3) + 'y');
    if (w.endsWith('ed')  && w.length > 2) s.add(w.slice(0, -2));
    if (w.endsWith('ing') && w.length > 3) s.add(w.slice(0, -3));
    if (w.endsWith('ing') && w.length > 4) s.add(w.slice(0, -3) + 'e');
    return [...s];
}

function getContextualDef(el) {
    const wrapper = el?.closest('.paragraph-wrapper');
    if (!wrapper) return '';
    const idx   = parseInt(wrapper.dataset.index, 10);
    const trans = articles[currentArticle]?.translation?.split('\n\n')?.[idx];
    return trans ? `语境：${trans}` : '';
}

function closePopup() {
    const popup = document.getElementById('wordPopup');
    popup.classList.remove('show');
    popup.style.transform = '';
    document.getElementById('popupBackdrop').classList.remove('show');
}

function updateStatusButtons() {
    const status = wordStatuses[currentWord] || 'unknown';
    document.querySelectorAll('.status-btn').forEach(btn => {
        btn.classList.toggle('active', btn.classList.contains(status));
    });
}

function setWordStatus(status) {
    wordStatuses[currentWord] = status;
    updateStatusButtons();
    saveProgress();
    updateStats();

    document.querySelectorAll(`.word[data-word="${currentWord}"]`).forEach(el => {
        el.classList.remove('mastered', 'review');
        if (status === 'mastered') el.classList.add('mastered');
        if (status === 'review')   el.classList.add('review');
    });

    const labels = { mastered:'✅ 已掌握', review:'🔴 需复习', unknown:'⚪ 不认识' };
    showToast(labels[status] || status);
    if (currentTab === 'words') renderWordList();
}

function pronounceWord() {
    const word  = document.getElementById('popupWord').textContent;
    const utt   = new SpeechSynthesisUtterance(word);
    const voice = getSelectedVoice() || findPreferredVoice(speechSynthesis.getVoices());
    utt.voice = voice || null;
    utt.lang  = voice?.lang || 'en-US';
    utt.rate  = 0.8;
    speechSynthesis.speak(utt);
}

// ── Translation toggle ──
function toggleTranslation() {
    showTranslation = !showTranslation;
    const btn = document.getElementById('translateBtn');
    btn.textContent = showTranslation ? '🌐 隐藏译文' : '🌐 翻译';
    btn.classList.toggle('active', showTranslation);
    document.querySelectorAll('.translation').forEach(el => el.classList.toggle('show', showTranslation));
}

// ── Practice mode ──
function togglePracticeMode() {
    practiceMode = !practiceMode;
    const btn     = document.getElementById('shadowBtn');
    const panel   = document.getElementById('practicePanel');
    const content = document.getElementById('articleContent');

    btn.classList.toggle('active', practiceMode);
    btn.textContent = practiceMode ? '🎭 退出练习' : '🎭 练习';
    panel.classList.toggle('show', practiceMode);
    content.classList.toggle('practice-mode', practiceMode);

    if (practiceMode && !showTranslation) toggleTranslation();
    if (!practiceMode) stopRecording();
}

// ── Recording ──
function toggleRecording() {
    if (mediaRecorder?.state === 'recording') stopRecording();
    else startRecording();
}

async function startRecording() {
    try {
        const stream  = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream);
        recordedChunks = [];

        mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };
        mediaRecorder.onstop = () => {
            recordedBlob = new Blob(recordedChunks, { type: 'audio/webm' });
            document.getElementById('playRecordingBtn').disabled = false;
            document.getElementById('recordingStatus').innerHTML = '<span style="color:var(--success)">✅ 录音完成，可以播放对比</span>';
        };

        mediaRecorder.start();
        recordingStart = Date.now();
        updateTimer();
        timerInterval = setInterval(updateTimer, 1000);

        document.getElementById('recordBtn').textContent = '⏹️ 停止录音';
        document.getElementById('recordBtn').classList.add('recording');
        document.getElementById('recordingStatus').innerHTML = '<span class="recording-indicator"><span class="rec-dot"></span>正在录音…</span>';
    } catch {
        document.getElementById('recordingStatus').innerHTML = '<span style="color:var(--error)">❌ 无法访问麦克风</span>';
    }
}

function stopRecording() {
    if (mediaRecorder?.state === 'recording') {
        mediaRecorder.stop();
        mediaRecorder.stream.getTracks().forEach(t => t.stop());
    }
    clearInterval(timerInterval);
    document.getElementById('recordBtn').textContent = '🎙️ 开始录音';
    document.getElementById('recordBtn').classList.remove('recording');
}

function updateTimer() {
    const s = Math.floor((Date.now() - recordingStart) / 1000);
    document.getElementById('practiceTimer').textContent =
        `${String(Math.floor(s / 60)).padStart(2,'0')}:${String(s % 60).padStart(2,'0')}`;
}

function playRecording() {
    if (recordedBlob) new Audio(URL.createObjectURL(recordedBlob)).play();
}

// ── Export / Import ──
function exportData() {
    if (!Object.keys(wordStatuses).length && !completedArticles.size) {
        return showToast('⚠️ 暂无学习数据可导出');
    }
    const data = { wordStatuses, completedArticles: [...completedArticles], exportDate: new Date().toISOString(), version: '2.0' };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url  = URL.createObjectURL(blob);
    const a    = Object.assign(document.createElement('a'), {
        href: url,
        download: `shadow-reading-${new Date().toISOString().slice(0,10)}.json`
    });
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    localStorage.setItem(LS.LAST_BACKUP, Date.now());
    showToast('✅ 学习数据已导出');
}

function handleImport(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
        try {
            const data = JSON.parse(e.target.result);
            if (data.wordStatuses)      wordStatuses    = data.wordStatuses;
            if (data.completedArticles) completedArticles = new Set(data.completedArticles);
            saveProgress();
            updateStats();
            renderArticleList();
            loadArticle(currentArticle);
            showToast('✅ 学习数据已导入');
        } catch {
            showToast('❌ 导入失败：文件格式错误');
        }
    };
    reader.onerror = () => showToast('❌ 文件读取失败');
    reader.readAsText(file);
    event.target.value = '';
}

// ── Shortcuts overlay ──
function showShortcuts() { document.getElementById('kbdOverlay').classList.add('show'); }
function hideShortcuts() { document.getElementById('kbdOverlay').classList.remove('show'); }

// ── Toast ──
let toastTimer;
function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2400);
}

// ── Keyboard shortcuts ──
document.addEventListener('keydown', e => {
    const tag = document.activeElement.tagName;
    if (tag === 'INPUT' || tag === 'SELECT' || tag === 'TEXTAREA') return;
    switch (e.key) {
        case 'Escape':     closePopup(); hideShortcuts(); break;
        case '?':          e.preventDefault(); showShortcuts(); break;
        case ' ':          e.preventDefault(); togglePlay(); break;
        case 's': case 'S': stopReading(); break;
        case 'ArrowLeft':  prevArticle(); break;
        case 'ArrowRight': nextArticle(); break;
        case 't': case 'T': toggleTranslation(); break;
    }
});

document.addEventListener('click', e => {
    const popup = document.getElementById('wordPopup');
    if (popup.classList.contains('show') && !popup.contains(e.target) && !e.target.classList.contains('word')) {
        closePopup();
    }
});

init();
</script>
