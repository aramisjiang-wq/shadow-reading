<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>单词本 - Shadow Reading</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: #1a1a24;
            --bg-hover: #22222e;
            --accent-primary: #00d4aa;
            --accent-secondary: #7c3aed;
            --accent-gradient: linear-gradient(135deg, #00d4aa 0%, #00a8cc 100%);
            --text-primary: #ffffff;
            --text-secondary: #a0a0b0;
            --text-muted: #606070;
            --success: #00d4aa;
            --warning: #f59e0b;
            --error: #ef4444;
            --border: rgba(255,255,255,0.06);
            --font-display: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            --font-body: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        .theme-light {
            --bg-primary: #f5f5f7;
            --bg-secondary: #ffffff;
            --bg-card: #ffffff;
            --bg-hover: #f0f0f2;
            --accent-primary: #00a884;
            --accent-gradient: linear-gradient(135deg, #00a884 0%, #0088cc 100%);
            --text-primary: #1a1a1a;
            --text-secondary: #333333;
            --text-muted: #555555;
            --success: #00a884;
            --border: rgba(0,0,0,0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-body);
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }

        .header h1 {
            font-size: 24px;
            font-weight: 600;
        }

        .header-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--bg-card);
            color: var(--text-primary);
            font-size: 14px;
            cursor: pointer;
            transition: all 0.15s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn:hover {
            background: var(--bg-hover);
        }

        .btn-primary {
            background: var(--accent-primary);
            color: #fff;
            border-color: var(--accent-primary);
        }

        .stats-bar {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px 20px;
            text-align: center;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .stat-value.total { color: var(--text-primary); }
        .stat-value.mastered { color: var(--success); }
        .stat-value.review { color: var(--error); }
        .stat-value.new { color: var(--text-muted); }

        .stat-label {
            font-size: 13px;
            color: var(--text-muted);
        }

        .category-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 12px;
        }

        .category-tab {
            padding: 8px 16px;
            border-radius: 6px;
            background: transparent;
            border: 1px solid transparent;
            color: var(--text-muted);
            font-size: 14px;
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .category-tab:hover {
            color: var(--text-primary);
            background: var(--bg-hover);
        }

        .category-tab.active {
            background: var(--accent-primary);
            color: #fff;
            border-color: var(--accent-primary);
        }

        .filter-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            align-items: center;
        }

        .search-input {
            flex: 1;
            min-width: 200px;
            padding: 10px 16px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--bg-card);
            color: var(--text-primary);
            font-size: 14px;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--accent-primary);
        }

        .filter-btn {
            padding: 10px 16px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--bg-card);
            color: var(--text-muted);
            font-size: 14px;
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .filter-btn:hover, .filter-btn.active {
            background: var(--accent-primary);
            color: #fff;
            border-color: var(--accent-primary);
        }

        .content-area {
            display: flex;
            gap: 20px;
        }

        .sidebar-categories {
            width: 200px;
            flex-shrink: 0;
        }

        .sidebar-title {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            padding: 0 8px;
        }

        .category-list {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            overflow: hidden;
        }

        .category-item {
            padding: 10px 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: all 0.15s ease;
            border-bottom: 1px solid var(--border);
        }

        .category-item:last-child {
            border-bottom: none;
        }

        .category-item:hover {
            background: var(--bg-hover);
        }

        .category-item.active {
            background: var(--accent-primary);
            color: #fff;
        }

        .category-item.active .category-count {
            color: rgba(255,255,255,0.8);
        }

        .category-name {
            font-size: 14px;
        }

        .category-count {
            font-size: 12px;
            color: var(--text-muted);
            background: var(--bg-hover);
            padding: 2px 8px;
            border-radius: 10px;
        }

        .words-area {
            flex: 1;
        }

        .section-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .section-header h2 {
            font-size: 18px;
            font-weight: 600;
        }

        .words-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 10px;
        }

        .word-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 14px 16px;
            cursor: pointer;
            transition: all 0.15s ease;
            position: relative;
        }

        .word-card:hover {
            background: var(--bg-hover);
            transform: translateY(-1px);
        }

        .word-card.mastered {
            border-left: 3px solid var(--success);
        }

        .word-card.mastered .word-text {
            color: var(--success);
            font-weight: 500;
        }

        .word-card.review {
            border-left: 3px solid var(--error);
        }

        .word-card.review .word-text {
            color: var(--error);
            font-weight: 500;
        }

        .word-card.new {
            border-left: 3px solid var(--text-muted);
        }

        .word-text {
            font-size: 16px;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        .word-pos {
            font-size: 11px;
            color: var(--accent-primary);
            background: rgba(0,212,170,0.1);
            padding: 2px 6px;
            border-radius: 4px;
            margin-right: 6px;
        }

        .word-meta {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .word-def {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 6px;
            line-height: 1.5;
            min-height: 36px;
        }

        .word-status-dot {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .word-status-dot.mastered { background: var(--success); }
        .word-status-dot.review { background: var(--error); }
        .word-status-dot.new { background: var(--text-muted); }

        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .theme-toggle {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--bg-card);
            color: var(--text-primary);
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .no-results {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .no-results h3 {
            margin-bottom: 8px;
            color: var(--text-secondary);
        }

        .pos-tag {
            display: inline-block;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 4px;
            margin-right: 4px;
            margin-bottom: 4px;
        }

        .pos-n { background: rgba(0,212,170,0.15); color: var(--success); }
        .pos-v { background: rgba(124,58,237,0.15); color: #a78bfa; }
        .pos-adj { background: rgba(245,158,11,0.15); color: var(--warning); }
        .pos-adv { background: rgba(59,130,246,0.15); color: #60a5fa; }
        .pos-prep { background: rgba(239,68,68,0.15); color: var(--error); }
        .pos-conj { background: rgba(236,72,153,0.15); color: #f472b6; }
        .pos-pron { background: rgba(34,197,94,0.15); color: #4ade80; }
        .pos-det { background: rgba(168,162,158,0.15); color: #a8a29e; }

        .word-popup {
            position: fixed;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px 20px;
            min-width: 280px;
            max-width: 340px;
            z-index: 1000;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            opacity: 0;
            transform: scale(0.95);
            transition: all 0.2s ease;
            pointer-events: none;
            display: none;
        }

        .word-popup.show {
            opacity: 1;
            transform: scale(1);
            pointer-events: auto;
            display: block;
        }

        .popup-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        .popup-word {
            font-size: 22px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .popup-phonetic {
            font-size: 14px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .popup-speak {
            background: var(--accent-primary);
            border: none;
            color: #fff;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.15s ease;
        }

        .popup-speak:hover {
            transform: scale(1.1);
        }

        .popup-def {
            font-size: 15px;
            color: var(--text-secondary);
            margin-bottom: 10px;
            line-height: 1.5;
        }

        .popup-example {
            font-size: 13px;
            color: var(--text-muted);
            font-style: italic;
            padding: 8px 12px;
            background: var(--bg-hover);
            border-radius: 6px;
            margin-bottom: 12px;
        }

        .popup-actions {
            display: flex;
            gap: 8px;
        }

        .popup-sources {
            margin-bottom: 12px;
            border-top: 1px solid var(--border);
            padding-top: 10px;
        }

        .popup-sources-title {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .popup-source-item {
            font-size: 12px;
            color: var(--text-secondary);
            background: var(--bg-hover);
            border-radius: 6px;
            padding: 8px;
            margin-bottom: 6px;
            line-height: 1.5;
        }

        .popup-source-item:last-child {
            margin-bottom: 0;
        }

        .popup-source-link {
            color: var(--accent-primary);
            text-decoration: none;
            font-size: 12px;
            display: inline-block;
            margin-top: 6px;
        }

        .popup-source-link:hover {
            text-decoration: underline;
        }

        .popup-btn {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--bg-secondary);
            color: var(--text-secondary);
            font-size: 12px;
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .popup-btn:hover {
            background: var(--bg-hover);
        }

        .popup-btn.mastered { border-color: var(--success); color: var(--success); }
        .popup-btn.review { border-color: var(--error); color: var(--error); }
        .popup-btn.new { border-color: var(--text-muted); color: var(--text-muted); }

        @media (max-width: 900px) {
            .content-area {
                flex-direction: column;
            }
            .sidebar-categories {
                width: 100%;
            }
            .category-list {
                display: flex;
                flex-wrap: wrap;
                border-radius: 10px;
            }
            .category-item {
                border-bottom: none;
                border-right: 1px solid var(--border);
            }
        }

        @media (max-width: 768px) {
            .stats-bar {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .words-grid {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📚 单词本</h1>
            <div class="header-actions">
                <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
                <button class="btn" onclick="exportData()" title="导出学习数据">📤 导出</button>
                <button class="btn" onclick="document.getElementById('importFile').click()" title="导入学习数据">📥 导入</button>
                <a href="index.html" class="btn">← 返回学习</a>
            </div>
        </div>
        <input type="file" id="importFile" accept=".json" style="display:none" onchange="handleImport(event)">

        <div class="stats-bar">
            <div class="stat-card">
                <div class="stat-value total" id="totalWords">0</div>
                <div class="stat-label">总单词</div>
            </div>
            <div class="stat-card">
                <div class="stat-value mastered" id="masteredWords">0</div>
                <div class="stat-label">已掌握</div>
            </div>
            <div class="stat-card">
                <div class="stat-value review" id="reviewWords">0</div>
                <div class="stat-label">待复习</div>
            </div>
            <div class="stat-card">
                <div class="stat-value new" id="newWords">0</div>
                <div class="stat-label">未学习</div>
            </div>
        </div>

        <div class="category-tabs">
            <button class="category-tab active" data-view="alpha" onclick="switchView('alpha')">🔤 按字母</button>
            <button class="category-tab" data-view="pos" onclick="switchView('pos')">📝 按词性</button>
            <button class="category-tab" data-view="scene" onclick="switchView('scene')">🎬 按场景</button>
        </div>

        <div class="filter-bar">
            <input type="text" class="search-input" id="searchInput" placeholder="搜索单词..." oninput="filterWords()">
            <button class="filter-btn active" data-filter="all" onclick="setStatusFilter('all')">全部</button>
            <button class="filter-btn" data-filter="mastered" onclick="setStatusFilter('mastered')">已掌握</button>
            <button class="filter-btn" data-filter="review" onclick="setStatusFilter('review')">待复习</button>
            <button class="filter-btn" data-filter="new" onclick="setStatusFilter('new')">未学习</button>
        </div>

        <div class="content-area">
            <div class="sidebar-categories" id="sidebarCategories"></div>
            <div class="words-area" id="wordsContainer"></div>
        </div>
    </div>

    <div class="toast" id="toast"></div>
    
    <div class="word-popup" id="wordPopup">
        <div class="popup-header">
            <div>
                <div class="popup-word" id="popupWord"></div>
                <div class="popup-phonetic" id="popupPhonetic"></div>
            </div>
            <button class="popup-speak" onclick="speakWord()" title="发音">🔊</button>
        </div>
        <div class="popup-def" id="popupDef"></div>
        <div class="popup-example" id="popupExample"></div>
        <div class="popup-sources" id="popupSources"></div>
        <div class="popup-actions">
            <button class="popup-btn mastered" onclick="setWordStatus('mastered')">✓ 已掌握</button>
            <button class="popup-btn review" onclick="setWordStatus('review')">↻ 待复习</button>
            <button class="popup-btn new" onclick="setWordStatus('new')">○ 未学习</button>
        </div>
    </div>

    <script src="articles-data.js"></script>
    <script src="dictionary-data.js"></script>

        function extractAllWords() {
            const wordMap = {};
            
            articles.forEach((article, articleIndex) => {
                const paragraphs = article.content.split('\n\n');
                const translations = article.translation ? article.translation.split('\n\n') : [];
                paragraphs.forEach((para, paraIndex) => {
                    const words = para.split(/[\s\n]+/);
                    const paraTranslation = translations[paraIndex] || '';
                    words.forEach(word => {
                        const cleanWord = word.toLowerCase().replace(/[.,!?;:'"()""''—–-]/g, '');
                        if (cleanWord && cleanWord.length > 1 && /^[a-z]+$/.test(cleanWord)) {
                            if (!wordMap[cleanWord]) {
                                wordMap[cleanWord] = {
                                    word: cleanWord,
                                    count: 0,
                                    articles: new Set(),
                                    pos: getWordPos(cleanWord),
                                    scenes: getWordScenes(cleanWord),
                                    contexts: []
                                };
                            }
                            wordMap[cleanWord].count++;
                            wordMap[cleanWord].articles.add(articleIndex);
                            addWordContext(wordMap[cleanWord], article, articleIndex, paraIndex, para, paraTranslation, cleanWord);
                        }
                    });

        function addWordContext(wordData, article, articleIndex, paraIndex, para, paraTranslation, word) {
            if (wordData.contexts.length >= 3) return;
            const sourceKey = `${articleIndex}-${paraIndex}`;
            if (wordData.contexts.some(context => context.sourceKey === sourceKey)) return;

            const sentence = pickSentenceFromParagraph(para, word);
            wordData.contexts.push({
                sourceKey,
                articleId: article.id || (articleIndex + 1),
                articleTitle: article.title,
                paragraphIndex: paraIndex + 1,
                sentence: sentence || para,
                translation: paraTranslation
            });
        }

        function pickSentenceFromParagraph(paragraph, word) {
            const sentences = paragraph.match(/[^.!?]+[.!?]?/g) || [paragraph];
            const exact = sentences.find(sentence => {
                const normalized = sentence.toLowerCase().replace(/[^a-z\s]/g, ' ');
                const tokens = normalized.split(/\s+/).filter(Boolean);
                return tokens.includes(word);
            });
            return (exact || sentences[0] || paragraph).trim();
        }

        function getWordCandidates(word) {
            const candidates = new Set();
            const lower = (word || '').toLowerCase();
            if (!lower) return [];
            candidates.add(lower);

            if (lower.endsWith('ies') && lower.length > 3) candidates.add(lower.slice(0, -3) + 'y');
            if (lower.endsWith('es') && lower.length > 2) candidates.add(lower.slice(0, -2));
            if (lower.endsWith('s') && lower.length > 1) candidates.add(lower.slice(0, -1));
            if (lower.endsWith('ied') && lower.length > 3) candidates.add(lower.slice(0, -3) + 'y');
            if (lower.endsWith('ed') && lower.length > 2) candidates.add(lower.slice(0, -2));
            if (lower.endsWith('ing') && lower.length > 3) candidates.add(lower.slice(0, -3));
            if (lower.endsWith('ing') && lower.length > 4) candidates.add(lower.slice(0, -3) + 'e');

            return [...candidates];
        }

            const candidates = getWordCandidates(word);

                        },
                        matchedWord: candidate
                    };
                }
            }
            return { entry: null, matchedWord: '' };
        }

                    if (count > 0) {
                        html += `
                            <div class="category-item" data-category="${pos}" onclick="setCategory('${pos}')">
                                <span class="category-name">${name}</span>
                                <span class="category-count">${count}</span>
                            </div>
                        `;
                    }
                });
                html += '</div>';
            } else if (currentView === 'scene') {
                html = `
                    <div class="sidebar-title">场景分类</div>
                    <div class="category-list">
                        <div class="category-item active" data-category="all" onclick="setCategory('all')">
                            <span class="category-name">全部</span>
                            <span class="category-count">${Object.keys(allWords).length}</span>
                        </div>
                `;
                Object.keys(sceneCategories).forEach(scene => {
                    const count = Object.values(allWords).filter(w => w.scenes.includes(scene)).length;
                    html += `
                        <div class="category-item" data-category="${scene}" onclick="setCategory('${scene}')">
                            <span class="category-name">${scene}</span>
                            <span class="category-count">${count}</span>
                        </div>
                    `;
                });
                html += '</div>';
            }
            
            sidebar.innerHTML = html;
        }

        function renderWords() {
            const container = document.getElementById('wordsContainer');
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            
            let filteredWords = Object.values(allWords).filter(wordData => {
                const status = wordStatuses[wordData.word] || 'new';
                const matchesSearch = wordData.word.includes(searchTerm);
                const matchesFilter = currentFilter === 'all' || status === currentFilter;
                
                let matchesCategory = currentCategory === 'all';
                if (!matchesCategory) {
                    if (currentView === 'alpha') {
                        const first = wordData.word[0].toUpperCase();
                        matchesCategory = currentCategory.includes(first);
                    } else if (currentView === 'pos') {
                        matchesCategory = wordData.pos === currentCategory;
                    } else if (currentView === 'scene') {
                        matchesCategory = wordData.scenes.includes(currentCategory);
                    }
                }
                
                return matchesSearch && matchesFilter && matchesCategory;
            });
            
            filteredWords.sort((a, b) => a.word.localeCompare(b.word));
            
            if (filteredWords.length === 0) {
                container.innerHTML = `
                    <div class="no-results">
                        <h3>没有找到匹配的单词</h3>
                        <p>尝试更换搜索词或筛选条件</p>
                    </div>
                `;
                return;
            }
            
            const posLabels = {
                n: 'n.', v: 'v.', adj: 'adj.', adv: 'adv.',
                prep: 'prep.', conj: 'conj.', pron: 'pron.', det: 'det.'
            };
            
            let html = `
                <div class="section-header">
                    <h2>${currentCategory === 'all' ? '全部单词' : currentCategory}</h2>
                    <span class="category-count">${filteredWords.length} 词</span>
                </div>
                <div class="words-grid">
            `;
            
            filteredWords.forEach(wordData => {
                const status = wordStatuses[wordData.word] || 'new';
                const posTag = wordData.pos ? `<span class="pos-tag pos-${wordData.pos}">${posLabels[wordData.pos] || wordData.pos}</span>` : '';
                const resolved = resolveDictionaryEntry(wordData.word);
                const defText = buildWordDefinition(wordData, resolved);
                if (!resolved.entry) {
                    requestAutoTranslation(wordData.word);
                }
                
                html += `
                    <div class="word-card ${status}" onclick="showWordPopup(event, '${wordData.word}')">
                        <span class="word-status-dot ${status}"></span>
                        <div class="word-text">${posTag}${wordData.word}</div>
                        <div class="word-def">${defText}</div>
                        <div class="word-meta">出现 ${wordData.count} 次 · ${wordData.articles.size} 篇</div>
                    </div>
                `;
            });
            
            html += '</div>';
            container.innerHTML = html;
        }

        let currentPopupWord = '';

        function showWordPopup(event, word) {
            event.stopPropagation();
            currentPopupWord = word;
            
            const popup = document.getElementById('wordPopup');
            const wordData = allWords[word];
            const resolved = resolveDictionaryEntry(word);
            const dictEntry = resolved.entry;
            
            document.getElementById('popupWord').textContent = word;
            
            if (dictEntry) {
                document.getElementById('popupPhonetic').textContent = dictEntry.phonetic || '';
                document.getElementById('popupDef').innerHTML = `<strong>${dictEntry.pos || ''}</strong> ${buildWordDefinition(wordData, resolved)}`;
                document.getElementById('popupExample').textContent = dictEntry.example ? `"${dictEntry.example}"` : '';
            } else {
                document.getElementById('popupPhonetic').textContent = '';
                document.getElementById('popupDef').textContent = buildWordDefinition(wordData, resolved);
                document.getElementById('popupExample').textContent = '';
                requestAutoTranslation(word);
            }

            renderPopupSources(wordData);
            
            const rect = event.target.closest('.word-card').getBoundingClientRect();
            let left = rect.right + 10;
            let top = rect.top;
            
            if (left + 340 > window.innerWidth) {
                left = rect.left - 350;
            }
            if (left < 10) {
                left = 10;
            }
            if (top + 200 > window.innerHeight) {
                top = window.innerHeight - 210;
            }
            
            popup.style.left = left + 'px';
            popup.style.top = top + 'px';
            popup.classList.add('show');
        }

        function hideWordPopup() {
            document.getElementById('wordPopup').classList.remove('show');
        }

        function renderPopupSources(wordData) {
            const sourceContainer = document.getElementById('popupSources');
            if (!wordData || !wordData.contexts || wordData.contexts.length === 0) {
                sourceContainer.innerHTML = '<div class="popup-sources-title">原文关联</div><div class="popup-source-item">暂无原文出处</div>';
                return;
            }

            sourceContainer.innerHTML = `
                <div class="popup-sources-title">原文关联</div>
                ${wordData.contexts.map(context => `
                    <div class="popup-source-item">
                        <strong>${context.articleTitle} · P${context.paragraphIndex}</strong><br>
                        ${context.sentence}<br>
                        <a class="popup-source-link" href="index.html?article=${context.articleId}&paragraph=${context.paragraphIndex}">跳转到原文段落</a>
                    </div>
                `).join('')}
            `;
        }

        function speakWord() {
            if (currentPopupWord) {
                const utterance = new SpeechSynthesisUtterance(currentPopupWord);
                const voice = getGoogleUSEnglishVoice();
                if (voice) {
                    utterance.voice = voice;
                    utterance.lang = voice.lang;
                } else {
                    utterance.lang = 'en-US';
                }
                utterance.rate = 0.8;
                speechSynthesis.speak(utterance);
            }
        }

        function getGoogleUSEnglishVoice() {
            const voices = window.speechSynthesis.getVoices();
            const googleUS = voices.find(voice => voice.name === 'Google US English');
            if (googleUS) return googleUS;
            return voices.find(voice => voice.lang === 'en-US') || voices.find(voice => voice.lang.startsWith('en')) || null;
        }

        async function requestAutoTranslation(word) {
            const candidates = getWordCandidates(word);
            if (candidates.some(candidate => dictionary && dictionary[candidate])) return;
            if (candidates.some(candidate => autoTranslations[candidate])) return;
            if (translatingWords.has(word)) return;

            translatingWords.add(word);
            try {
                const translation = await fetchWordTranslation(word);
                if (translation) {
                    autoTranslations[word] = translation;
                    saveAutoTranslations();
                    renderWords();
                    if (currentPopupWord === word) {
                        const popupDef = document.getElementById('popupDef');
                        popupDef.textContent = translation;
                    }
                }
            } finally {
                translatingWords.delete(word);
            }
        }

        async function fetchWordTranslation(word) {
            try {
                const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=zh-CN&dt=t&q=${encodeURIComponent(word)}`;
                const response = await fetch(url);
                if (!response.ok) return '';
                const data = await response.json();
                return data && data[0] && data[0][0] ? data[0][0][0] : '';
            } catch (err) {
                return '';
            }
        }

        function setWordStatus(status) {
            if (!currentPopupWord) return;
            
            if (status === 'new') {
                delete wordStatuses[currentPopupWord];
            } else {
                wordStatuses[currentPopupWord] = status;
            }
            
            saveProgress();
            updateStats();
            renderWords();
            hideWordPopup();
            
            const statusNames = { new: '未学习', mastered: '已掌握', review: '待复习' };
            showToast(`"${currentPopupWord}" → ${statusNames[status]}`);
        }

        function cycleStatus(word) {
            const current = wordStatuses[word] || 'new';
            const statusOrder = ['new', 'mastered', 'review'];
            const currentIndex = statusOrder.indexOf(current);
            const nextIndex = (currentIndex + 1) % statusOrder.length;
            
            if (nextIndex === 0) {
                delete wordStatuses[word];
            } else {
                wordStatuses[word] = statusOrder[nextIndex];
            }
            
            saveProgress();
            updateStats();
            renderWords();
            
            const statusNames = { new: '未学习', mastered: '已掌握', review: '待复习' };
            const newStatus = wordStatuses[word] || 'new';
            showToast(`"${word}" → ${statusNames[newStatus]}`);
        }

        function filterWords() {
            renderWords();
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 1500);
        }

        function exportData() {
            const data = {
                wordStatuses: wordStatuses,
                exportDate: new Date().toISOString(),
                version: '1.0'
            };
            
            console.log('导出数据:', data);
            
            if (Object.keys(wordStatuses).length === 0) {
                showToast('⚠️ 没有学习数据可导出');
                return;
            }
            
            try {
                const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `shadow-reading-progress-${new Date().toISOString().slice(0,10)}.json`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                
                localStorage.setItem('shadowReading_lastBackup', Date.now().toString());
                showToast('✅ 学习数据已导出');
            } catch (e) {
                console.error('导出错误:', e);
                showToast('❌ 导出失败: ' + e.message);
            }
        }

        function handleImport(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            console.log('导入文件:', file.name);
            
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    console.log('导入数据:', data);
                    
                    if (data.wordStatuses) {
                        wordStatuses = data.wordStatuses;
                    }
                    saveProgress();
                    updateStats();
                    renderWords();
                    showToast('✅ 学习数据已导入');
                } catch (err) {
                    console.error('导入错误:', err);
                    showToast('❌ 导入失败：文件格式错误');
                }
            };
            reader.onerror = (e) => {
                console.error('文件读取错误:', e);
                showToast('❌ 文件读取失败');
            };
            reader.readAsText(file);
            event.target.value = '';
        }

        function init() {
            loadTheme();
            loadProgress();
            loadAutoTranslations();
            extractAllWords();
            updateStats();
            renderSidebar();
            renderWords();
            
            document.addEventListener('click', (e) => {
                const popup = document.getElementById('wordPopup');
                if (popup.classList.contains('show') && !popup.contains(e.target)) {
                    hideWordPopup();
                }
            });
        }

        init();
    </script>
</body>
</html>
